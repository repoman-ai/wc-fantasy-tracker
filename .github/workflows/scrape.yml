name: Scrape pool & update data

# ---------------------------------------------------------------------------
# Scrapes the leaderboard + every player's prediction page, then commits the
# refreshed JSON into data/ (only when the scrape succeeds AND something changed).
# ---------------------------------------------------------------------------
on:
  # ---------------------------------------------------------------------------
  # SCHEDULE — slot-based recurring crons (Jun–Jul only, tournament months)
  #
  # Replaces 400+ date-specific crons that GitHub's scheduler never registered.
  # Kickoff UTC hours used in the official FIFA 2026 group schedule:
  #   16–23, 00–04, plus 22:30 for a few matches.
  #
  # Three triggers per on-the-hour slot:
  #   +5 min   shortly after kickoff
  #   +55 min  half-time / late live
  #   +2h 30m  full-time + buffer
  #
  # 22:30 slot uses :35 / :25 / :00(+1d) offsets instead.
  # Knockout ET/penalties: extra +3h 20m trigger on evening slots.
  #
  # Daily 08:07 UTC safety net (off the top of the hour for reliability).
  # ---------------------------------------------------------------------------
  schedule:
    - cron: "7 8 * 6,7 *"

    # +5 min after kickoff
    - cron: "5 16,17,18,19,20,21,22,23 * 6,7 *"
    - cron: "35 22 * 6,7 *"      # 22:30 kickoff
    - cron: "5 0,1,2,3,4 * 6,7 *"

    # +55 min half-time (23:25 = 22:30 + 55m)
    - cron: "55 16,17,18,19,20,21,22,23 * 6,7 *"
    - cron: "25 23 * 6,7 *"
    - cron: "55 0,1,2,3,4 * 6,7 *"

    # +2h 30m full-time
    - cron: "35 18,19,20,21,22,23 * 6,7 *"
    - cron: "35 0,1,2,3,4,5,6 * 6,7 *"
    - cron: "0 1 * 6,7 *"       # 22:30 kickoff FT (~01:00)

    # +3h 20m knockout ET / penalties
    - cron: "20 19,22,23 * 6,7 *"
    - cron: "20 0,1,2 * 6,7 *"
    - cron: "50 1 * 6,7 *"      # 22:30 + 3h20 (~01:50)

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      MAX_ATTEMPTS: "3"
      RETRY_GAP_SECONDS: "240"
      FETCH_BACKEND: "auto"
      BROWSER_HEADLESS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrape (with retry/backoff)
        run: xvfb-run -a python scraper.py --out data

      - name: Commit updated data (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rankings.json data/history.json data/predictions.json
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "data: refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
          echo "Committed updated data."

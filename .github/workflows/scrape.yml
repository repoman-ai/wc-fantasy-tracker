name: Scrape pool & update data

# ---------------------------------------------------------------------------
# Scrapes the leaderboard + every player's prediction page, then commits the
# refreshed JSON into data/ (only when the scrape succeeds AND something changed).
#
# SCHEDULE (auto-generated from the FIFA World Cup 2026 match schedule):
#   For every kickoff we trigger a scrape at +1h55, +2h05 and +2h30 after the
#   start, so results land as soon as a match wraps up (the +1h55 run usually
#   catches the closing live minutes; +2h05/+2h30 lock in the final score).
#   Knockout matches get an extra run at +3h20 to cover extra time + penalties.
#
#   Match kickoff times in the schedule are Eastern (EDT = UTC-4); the cron
#   lines below are in UTC (GitHub Actions cron is ALWAYS UTC).
#
# Cron format:  minute hour day-of-month month day-of-week

name: Scrape pool & update data

# ---------------------------------------------------------------------------
# Scrapes the leaderboard + every player's prediction page, then commits the
# refreshed JSON into data/ (only when the scrape succeeds AND something changed).
# ---------------------------------------------------------------------------
on:
  # ---------------------------------------------------------------------------
  # SCHEDULE — slot-based recurring crons (tournament kickoff hours, UTC)
  #
  # Four triggers per on-the-hour kickoff slot:
  #   +5 min    shortly after kickoff
  #   +50 min   half-time
  #   +2h       near end / closing minutes
  #   +2h 30m   full-time + buffer
  #
  # 22:30 kickoff slot uses :35 / :20 / :30 / :00(+1d) for those four beats.
  # Knockout ET/penalties: extra +3h 20m on evening slots (shares 23:20 w/ HT).
  #
  # Daily 08:07 UTC safety net (off the top of the hour for reliability).
  # Month field uses * — scraper only commits when data changes.
  # ---------------------------------------------------------------------------
  schedule:
    - cron: "17 * * * *"        # probe: hourly; remove once schedule confirmed

    - cron: "7 8 * * *"         # daily safety net 08:07 UTC

    # +5 min after kickoff
    - cron: "5 16,17,18,19,20,21,22,23 * * *"
    - cron: "35 22 * * *"       # 22:30 kickoff
    - cron: "5 0,1,2,3,4 * * *"

    # +50 min half-time
    - cron: "50 16,17,18,19,20,21,22,23 * * *"
    - cron: "50 0,1,2,3,4 * * *"

    # +2h near end
    - cron: "0 18,19,20,21,22,23 * * *"
    - cron: "0 0,1 * * *"      # 22:00 & 23:00 kickoffs
    - cron: "30 0 * * *"       # 22:30 kickoff → 00:30
    - cron: "0 2,3,4,5,6 * * *"

    # +2h 30m full-time
    - cron: "35 18,19,20,21,22,23 * * *"
    - cron: "35 0,1,2,3,4,5,6 * * *"
    - cron: "0 1 * * *"        # 22:30 kickoff FT (~01:00)

    # +3h 20m knockout ET / penalties (23:20 also covers 22:30 half-time)
    - cron: "20 19,22,23 * * *"
    - cron: "20 0,1,2 * * *"
    - cron: "50 1 * * *"       # 22:30 + 3h20 (~01:50)

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      MAX_ATTEMPTS: "3"
      RETRY_GAP_SECONDS: "240"
      FETCH_BACKEND: "auto"
      BROWSER_HEADLESS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrape (with retry/backoff)
        run: xvfb-run -a python scraper.py --out data

      - name: Commit updated data (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rankings.json data/history.json data/predictions.json
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "data: refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin main; then
              echo "Committed updated data."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing and retrying..."
            sleep 3
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1

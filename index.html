    const side=s=> s==='H'?f.home : s==='A'?f.away : 'a draw';
    const hero=picks.find(pk=>(pk.points||0)>0);
    const matchup=m?`${f.home} ${m.h}–${m.a} ${f.away}`:`${f.home} v ${f.away}`;
    return {
      key:String(f.num), f, counted, hitCount, exactCount, actualWinner, consensusWinner,
      consensusShare:counted?cmax/counted:0, totalGoals:m?m.h+m.a:0, matchup,
      resultPhrase:m?(actualWinner==='D'?`the ${m.h}–${m.a} stalemate`:`${side(actualWinner)}'s ${m.h}–${m.a}`):'',
      heroName:hero?nameById[hero.teamId]:'',
      wrongSide:side(consensusWinner),
      consensusPhrase:consensusWinner==='D'?'toward a draw':`behind ${side(consensusWinner)}`,
    };
  });
}

function debriefMajorityRound(fxs){
  const c={}; fxs.forEach(f=>{ const r=f.round||'Match Day'; c[r]=(c[r]||0)+1; });
  let best='Match Day',n=-1; Object.keys(c).forEach(k=>{ if(c[k]>n){n=c[k];best=k;} }); return best;
}

/* Assemble everything a detector might need for one settled day. */
function debriefContext(date){
  const fixtures=debriefFixtures();
  const days=debriefDays(fixtures);
  const day=days.get(date); if(!day || !day.settled) return null;
  const datesAsc=[...days.values()]
    .filter(d=>d.settled && debriefStandingsAsOf(fixtures,d.date))
    .map(d=>d.date).sort();
  const idx=datesAsc.indexOf(date);
  if(idx<0) return null;
  const nameById={}; Object.values(PRED).forEach(p=>nameById[p.team_id]=p.name);

  const players=debriefDayStats(day);
  players.forEach(p=>p.bestDesc=debriefPickDesc(p.best));
  const topScore=players[0]?players[0].points:null;
  const topPlayers=players.filter(p=>p.points===topScore);
  const bestCalls=debriefBestCalls(players);
  const bestCall=bestCalls[0]||null;

  const cur=debriefStandingsAsOf(fixtures,date);
  const prevDate=idx>0?datesAsc[idx-1]:null;
  const prev=prevDate?debriefStandingsAsOf(fixtures,prevDate):null;
  const prevDay=prevDate?days.get(prevDate):null;
  const prevPlayers=prevDay?debriefDayStats(prevDay):[];
  let topClimber=null,topFaller=null;
  if(cur&&prev){
    cur.arr.forEach(r=>{
      const was=prev.byId[r.teamId]; if(!was) return;
      const delta=was.rank-r.rank;
      if(delta>0 && (!topClimber||delta>topClimber.delta)) topClimber={teamId:r.teamId,name:r.name,delta,rank:r.rank};
      if(delta<0 && (!topFaller||delta<topFaller.delta)) topFaller={teamId:r.teamId,name:r.name,delta,rank:r.rank};
    });
  }
  const ls=debriefLeaderStreak(fixtures,datesAsc,idx);
  // How long the player who just got knocked off the top had been leading, so a
  // takeover can frame the end of a long reign rather than a plain handover. By
  // construction the leader as of the previous settled day IS prevLeader, so
  // this streak belongs to them.
  const prevLs=idx>0?debriefLeaderStreak(fixtures,datesAsc,idx-1):{leadId:null,n:0};

  // On deck: the earliest later day that still has unplayed fixtures (skips any
  // rest days), summarised from its visible upcoming picks. Null once the
  // tournament's last whistle has blown.
  let nextDay=null;
  const laterDates=[...days.values()].map(d=>d.date).filter(d=>d>date).sort();
  for(const nx of laterDates){
    const upcoming=days.get(nx).fixtures.filter(f=>!isCompleted(f));
    if(!upcoming.length) continue;
    const round=debriefMajorityRound(upcoming);
    const stats=debriefPreviewStats(upcoming);
    nextDay={ date:nx, dateLabel:debriefDateLabel(nx), round, fixtures:upcoming, stats,
      matchCount:upcoming.length, knockout:debriefIsKnockout(round),
      allTbd:stats.every(s=>!s.teamsKnown) };
    break;
  }

  return {
    date, dateLabel:debriefDateLabel(date), round:debriefMajorityRound(day.fixtures), edition:idx+1, nextDay,
    fixtures:day.fixtures, players, topPlayers, bestCall, bestCalls,
    leader:cur.arr[0], prevLeader:prev?prev.arr[0]:null, leaderN:ls.n, prevLeaderN:prevLs.n,
    topClimber, topFaller, standings:cur.arr, prevById:prev?prev.byId:null,
    settledDates:datesAsc, dayIndex:idx, prevStandings:prev?prev.arr:null,
    fixtureStats:debriefFixtureStats(day,nameById), nameById,
    poolExacts:players.reduce((a,p)=>a+p.exacts,0),
    prevPoolExacts:prevPlayers.reduce((a,p)=>a+p.exacts,0),
    avgDay:players.length?Math.round(players.reduce((a,p)=>a+p.points,0)/players.length):0,
  };
}

/* The detector battery. Each returns a story candidate or nothing. */
function debriefStories(ctx,opt){
  opt=opt||{};
  const S=[], add=o=>{ if(o) S.push(o); };
  const fs=ctx.fixtureStats, top=ctx.players[0];

  ctx.players.forEach(p=>{
    if(p.nFin>=2 && p.exacts===p.nFin){
      add({id:'perfect',drama:96+p.nFin,icon:'🎯',
        headline:`Perfect Card: ${p.name} Nails ${ctx.round}`,
        dek:`${p.exacts} for ${p.nFin}, every finished scoreline right. That is as clean as a day gets.`,
        link:{playerId:p.teamId}});
    } else if(p.nFin>=3 && p.exacts===p.nFin-1){
      add({id:'nearperfect',drama:79,icon:'🎯',
        headline:`One Bounce from Perfect: ${p.name}`,
        dek:`${p.exacts} of ${p.nFin} spot on, with one scoreline keeping the card human.`,
        link:{playerId:p.teamId}});
    }
  });

  // Multiple exact scorelines from one player in a single day — short of a
  // perfect/near-perfect card (those fire above and carry their own story), but
  // still a standout: nailing two or three scores on the nose is rare. We surface
  // the sharpest such card (most exacts, then most points); the drama scales with
  // the exact count so a three-bullseye day outranks a two. The day's top scorer
  // is already celebrated by the MVP card (whose subtitle counts their exacts), so
  // we prefer a multi-exact player from outside the top score — the card then adds
  // someone new rather than piling onto the MVP — falling back to the field only
  // when every multi-exact card belongs to the joint-top score.
  const topScore=ctx.players[0]?ctx.players[0].points:null;
  const multiAll=ctx.players
    .filter(p=>p.exacts>=2 && !(p.exacts===p.nFin) && !(p.nFin>=3 && p.exacts===p.nFin-1))
    .sort((a,b)=>b.exacts-a.exacts || b.points-a.points);
  const multi=multiAll.find(p=>p.points!==topScore)||multiAll[0];
  if(multi) add({id:'multiexact',drama:46+Math.min(18,(multi.exacts-1)*9),icon:'🎯',
    headline:`${multi.name} Lands ${multi.exacts} Exact Scores`,
    dek:`${multi.exacts} scorelines called on the nose in one day${multi.nFin>multi.exacts?` from ${multi.nFin} finished matches`:''} — a sharp card even with the rest of the slate in the mix.`,
    link:{playerId:multi.teamId}});

  if(top){
    const tied=ctx.topPlayers&&ctx.topPlayers.length>1;
    const second=ctx.players.find(p=>p.points<top.points), margin=second?top.points-second.points:top.points;
    add({id:'daywinner',drama:48+Math.min(28,Math.round(margin/4))+(tied?8:0),icon:'🏆',
      headline: tied?`Tied at the Top: ${debriefNameList(ctx.topPlayers.map(p=>p.name),2)}`
        : margin>=60?`${top.name} Sets the Pace with ${top.points}`:`${top.name} Wins the Day`,
      dek: tied?`${ctx.topPlayers.length} players shared the high score on ${top.points}. No need for a tiebreaker when the bragging rights can travel.`
        : second?`${top.points} points, clear of ${second.name} by ${margin}. ${marginPhrase(margin)}`
        :`${top.points} points and the day's bragging rights.`,
      link:tied?null:{playerId:top.teamId}});
  }

  if(ctx.prevLeader && ctx.leader && ctx.prevLeader.teamId!==ctx.leader.teamId){
    // Frame the handover by how long the dethroned player had reigned: a multi-
    // day run getting ended is a bigger deal than a one-day lead changing hands.
    const reign=ctx.prevLeaderN||0, longReign=reign>=3;
    add({id:'takeover',drama:93+Math.min(5,Math.max(0,reign-1)),icon:'👑',
      headline: longReign?`Dethroned: ${ctx.leader.name} Ends ${ctx.prevLeader.name}'s Reign`
        :`New Leader: ${ctx.leader.name} Takes First`,
      dek: longReign?`The top spot changes hands as ${ctx.leader.name} knocks off ${ctx.prevLeader.name}, whose ${reign}-day run on top is over.`
        : reign>=2?`The top spot changes hands as ${ctx.leader.name} moves past ${ctx.prevLeader.name}, ending a ${reign}-day stay at the summit.`
        :`The top spot changes hands as ${ctx.leader.name} moves past ${ctx.prevLeader.name} on the overall table.`,
      link:{playerId:ctx.leader.teamId}});
  } else if(ctx.leaderN>=2 && ctx.leader){
    add({id:'streak',drama:38+Math.min(42,ctx.leaderN*7),icon:'👑',
      headline:`${ctx.leader.name} Stays Top for Day ${ctx.leaderN}`,
      dek:`${ctx.leader.name} has led after ${ctx.leaderN} straight settled days. The chase pack still has plenty of road.`,
      link:{playerId:ctx.leader.teamId}});
  }

  if(ctx.topClimber && ctx.topClimber.delta>=1){
    const c=ctx.topClimber;
    add({id:'climber',drama:28+c.delta*9,icon:'🚀',
      headline:`${c.name} Climbs ${c.delta} Spot${c.delta>1?'s':''}`,
      dek:`A strong card moves ${c.name} to ${ordinal(c.rank)} overall. That is how the table starts to tilt.`,
      link:{playerId:c.teamId}});
  }
  if(ctx.topFaller && ctx.topFaller.delta<=-1){
    const f=ctx.topFaller;
    add({id:'faller',drama:22+Math.abs(f.delta)*5,icon:'🌦',
      headline:`${f.name} Gives Back ${Math.abs(f.delta)} Spot${Math.abs(f.delta)>1?'s':''}`,
      dek:`A quieter turn nudges ${f.name} to ${ordinal(f.rank)} overall. Plenty of football left on the card.`,
      link:{playerId:f.teamId}});
  }

  if(top && ctx.leader && ctx.prevLeader && ctx.prevLeader.teamId===ctx.leader.teamId && top.teamId!==ctx.leader.teamId && ctx.prevById){
    const leaderDay=(ctx.players.find(p=>p.teamId===ctx.leader.teamId)||{}).points||0;
    const row=ctx.standings.find(r=>r.teamId===top.teamId), prevRow=ctx.prevById[top.teamId];
    const narrowed=row&&prevRow?Math.max(0,(ctx.prevLeader.points-prevRow.points)-(ctx.leader.points-row.points)):0;
    if(row&&row.rank>1&&top.points-leaderDay>=18&&narrowed>0){
      add({id:'loudchase',drama:47+Math.min(20,Math.round(narrowed/4)),icon:'📣',
        headline:`Quiet Leader, Loud Chase: ${top.name}`,
        dek:`${ctx.leader.name} still leads overall, but ${top.name} won the day and trimmed the gap by ${narrowed}.`,
        link:{playerId:top.teamId}});
    }
  }

  const miss=fs.filter(s=>s.counted>=6 && s.hitCount===0).sort((a,b)=>b.counted-a.counted)[0];
  if(miss) add({id:'allmissed',drama:75+(miss.exactCount===0?6:0),icon:'🙈',
    headline:`The Pool Misses ${miss.matchup}`,
    dek:`${miss.resultPhrase.charAt(0).toUpperCase()+miss.resultPhrase.slice(1)} left all ${miss.counted} scorecards empty. One for the group chat.`,
    link:{matchKey:miss.key}});

  const lone=fs.filter(s=>s.counted>=6 && s.hitCount===1).sort((a,b)=>b.counted-a.counted)[0];
  if(lone) add({id:'lone',drama:67,icon:'🧠',
    headline:`Only ${lone.heroName} Found ${lone.matchup}`,
    dek:`The match fooled almost everyone, but ${lone.heroName} backed ${lone.resultPhrase} and banked the points.`,
    link:{matchKey:lone.key}});

  const cons=fs.filter(s=>s.consensusWinner&&s.actualWinner&&s.consensusWinner!==s.actualWinner&&s.consensusShare>=0.55&&s.hitCount<s.counted)
              .sort((a,b)=>b.consensusShare-a.consensusShare)[0];
  if(cons) add({id:'consensus',drama:50+Math.round(cons.consensusShare*20),icon:'📉',
    headline:`Group Lean Goes Sideways: ${cons.matchup}`,
    dek:`${Math.round(cons.consensusShare*100)}% of the pool leaned ${cons.consensusPhrase}; the final score had other ideas.`,
    link:{matchKey:cons.key}});

  const trap=fs.filter(s=>s.consensusWinner&&s.actualWinner&&s.consensusWinner!==s.actualWinner&&s.consensusShare>=0.55&&s.hitCount>1&&s.hitCount/s.counted<=0.35)
               .sort((a,b)=>a.hitCount-b.hitCount || b.consensusShare-a.consensusShare)[0];
  if(trap) add({id:'trap',drama:54+Math.round(trap.consensusShare*12),icon:'🪤',
    headline:`Trap Match: ${trap.matchup}`,
    dek:`The popular side missed, but ${trap.hitCount} players still found points from ${trap.resultPhrase}.`,
    link:{matchKey:trap.key}});

  const cluster=fs.filter(s=>s.exactCount>=3).sort((a,b)=>b.exactCount-a.exactCount)[0];
  if(cluster) add({id:'bullseye',drama:30+cluster.exactCount*3,icon:'🎯',
    headline:`Bullseye Club: ${cluster.exactCount} Nailed ${cluster.matchup}`,
    dek:`${cluster.exactCount} players landed the exact score. A tidy little chorus of correct scorelines.`,
    link:{matchKey:cluster.key}});

  const allhit=fs.filter(s=>s.counted>=6 && s.hitCount===s.counted).sort((a,b)=>b.exactCount-a.exactCount || b.counted-a.counted)[0];
  if(allhit) add({id:'allhit',drama:44+Math.min(14,allhit.exactCount*2),icon:'🤝',
    headline:`Everyone Got a Piece of ${allhit.matchup}`,
    dek:`All ${allhit.counted} visible picks earned points. Some days everyone sees the same thing.`,
    link:{matchKey:allhit.key}});

  const cash=fs.filter(s=>s.counted>=6 && s.consensusWinner&&s.actualWinner===s.consensusWinner&&s.consensusShare>=0.6&&s.hitCount/s.counted>=0.6&&s.hitCount<s.counted)
               .sort((a,b)=>b.consensusShare-a.consensusShare || b.hitCount-a.hitCount)[0];
  if(cash) add({id:'cash',drama:39+Math.round(cash.consensusShare*18),icon:'🤝',
    headline:`Consensus Cashes on ${cash.matchup}`,
    dek:`${Math.round(cash.consensusShare*100)}% leaned ${cash.consensusPhrase}, and ${cash.hitCount} players came away with points.`,
    link:{matchKey:cash.key}});

  const split=fs.filter(s=>s.counted>=6 && s.consensusShare<=0.45 && s.hitCount>0 && s.hitCount<s.counted)
                .sort((a,b)=>a.consensusShare-b.consensusShare || b.totalGoals-a.totalGoals)[0];
  if(split) add({id:'split',drama:35+Math.round((.45-split.consensusShare)*40),icon:'⚖️',
    headline:`Split Room on ${split.matchup}`,
    dek:`No side had a majority before kickoff. The points landed, but nobody can claim the room was settled.`,
    link:{matchKey:split.key}});

  if(ctx.poolExacts===0 && ctx.fixtures.length>=2){
    const hard=fs.slice().sort((a,b)=>a.exactCount-b.exactCount || b.totalGoals-a.totalGoals)[0];
    add({id:'noexact',drama:40,icon:'🎯',
      headline:`No Bullseyes on the Card`,
      dek:`The outcomes gave out points, but the exact scorelines stayed just out of reach for everyone.`,
      link:hard?{matchKey:hard.key}:null});
  }

  if(ctx.prevPoolExacts===0 && ctx.poolExacts>0 && ctx.dayIndex>0){
    const exacts=ctx.players.filter(p=>p.exacts>0).sort((a,b)=>b.exacts-a.exacts || b.points-a.points);
    add({id:'droughtend',drama:42+Math.min(18,ctx.poolExacts*4),icon:'🎯',
      headline:`Exact Score Drought Ends`,
      dek:`After a card with no bullseyes, ${debriefNameList(exacts.map(p=>p.name),3)} brought the exact scores back.`,
      link:exacts[0]?{playerId:exacts[0].teamId}:null});
  }

  const clean=ctx.players.filter(p=>p.nFin>=2&&p.hits===p.nFin&&p.exacts<p.nFin);
  if(clean.length>=2){
    add({id:'cleancrew',drama:37+Math.min(18,clean.length*4),icon:'✅',
      headline:`Clean Sheet Crew: ${clean.length} Scored on Every Match`,
      dek:`${debriefNameList(clean.map(p=>p.name),3)} scored on every finished match without needing the exact-card spotlight.`,
      link:null});
  }

  const wild=fs.slice().sort((a,b)=>b.totalGoals-a.totalGoals)[0];
  if(wild && wild.totalGoals>=4) add({id:'goalfest',drama:18,icon:'⚽',
    headline:`Goalfest: ${wild.matchup}`,
    dek:`${wild.totalGoals} goals in a single match — the wildest result on the card.`,
    link:{matchKey:wild.key}});

  if(ctx.players.length>=2){
    const m=ctx.players[0].points-ctx.players[1].points;
    if(m>0 && m<=12) add({id:'photo',drama:34,icon:'📸',
      headline:`Photo Finish for the Day's Top Score`,
      dek:`${ctx.players[0].name} edged ${ctx.players[1].name} by just ${m}. Tiny margins, loud scoreboard.`,
      link:{playerId:ctx.players[0].teamId}});
  }

  if(ctx.standings.length>=3){
    const gap=ctx.standings[0].points-ctx.standings[2].points;
    if(gap>0 && gap<=90) add({id:'tighttop',drama:32+Math.round((90-gap)/6),icon:'🪜',
      headline:`The Top Three Stay Bunched`,
      dek:`Only ${gap} points separate first from third. Nobody gets to breathe up there for long.`,
      link:{playerId:ctx.leader&&ctx.leader.teamId}});
  }

  if(ctx.prevStandings&&ctx.standings.length>=2){
    let squeeze=null;
    for(let i=0;i<Math.min(5,ctx.standings.length-1);i++){
      const a=ctx.standings[i], b=ctx.standings[i+1], pa=ctx.prevById&&ctx.prevById[a.teamId], pb=ctx.prevById&&ctx.prevById[b.teamId];
      if(!pa||!pb) continue;
      const oldGap=pa.points-pb.points, gap=a.points-b.points, diff=oldGap-gap;
      if(diff>=20 && gap<=70 && (!squeeze||diff>squeeze.diff)) squeeze={a,b,gap,diff};
    }
    if(squeeze) add({id:'squeeze',drama:36+Math.min(22,Math.round(squeeze.diff/3)),icon:'🪜',
      headline:`Late Table Squeeze: ${squeeze.b.name} Closes In`,
      dek:`The gap to ${squeeze.a.name} shrank by ${squeeze.diff}; it is down to ${squeeze.gap} points on the table.`,
      link:{playerId:squeeze.b.teamId}});
  }

  add({id:'quiet',drama:8,icon:'🗞️',
    headline:`A Steady ${ctx.round} at the Top`,
    dek:`No table-shaker today${ctx.leader?` — ${ctx.leader.name} keeps the lead`:''}. Everyone resets for the next kickoff.`,
    link:ctx.leader?{playerId:ctx.leader.teamId}:null});

  return debriefStorySort(ctx,S,opt.noFatigue?[]:debriefRecentLeads(ctx));
}

/* Short eyebrow label for a story promoted into the day's awards row. */
function debriefStoryTag(id){
  return ({
    perfect:'Perfect card', nearperfect:'So close', multiexact:'Multiple exacts', daywinner:'Day winner',
    takeover:'New leader', streak:'Still top', climber:'On the rise',
    faller:'Slipping', loudchase:'Loud chase', allmissed:'Pool blank',
    lone:'Lone read', consensus:'Group misses', trap:'Trap match',
    bullseye:'Bullseye club', allhit:'Everyone scores', cash:'Consensus cashes',
    split:'Split room', noexact:'No bullseyes', droughtend:'Drought ends',
    cleancrew:'Clean sheets', goalfest:'Goalfest', photo:'Photo finish',
    tighttop:'Tight top', squeeze:'Table squeeze', quiet:'Quiet day'
  })[id]||'Also today';
}

function debriefLinkAttr(link){
  if(!link) return '';
  if(link.playerId) return ` data-player-id="${esc(link.playerId)}" role="button" tabindex="0"`;
  if(link.matchKey) return ` data-match-key="${esc(link.matchKey)}" role="button" tabindex="0"`;
  return '';
}

/* ===== On deck: a small, forward-looking peek at the next day's slate. =====
   Same data source as the recap, but no results yet — so the detectors read the
   room from the visible upcoming picks (a heavy crowd lean, a divided house, a
   lone holdout), flag a marquee knockout, or note what's at stake on the table.
   Deliberately small: one anchor line plus at most two notable chips, shown only
   when something actually stands out. */

/* A round label is a knockout stage if it isn't one of the group matchdays. */
function debriefIsKnockout(round){ return !!round && !/^matchday/i.test(round); }
/* "2 - 1" -> "2–1" for display. */
function debriefNiceScore(s){ return clean(s).replace(/\s*-\s*/,'–'); }
/* "match" / "matches" pluralisation — the count is shown alongside (sometimes
   styled separately, e.g. the db-big slot), so this returns just the noun. */
function matchWord(n){ return `match${n===1?'':'es'}`; }

/* Per-fixture read of how the pool is leaning on an upcoming match, from the
   visible score picks only (hidden picks and TBD knockout slots don't count). */
function debriefPreviewStats(fixtures){
  return fixtures.map(f=>{
    const picks=f.picks.filter(pk=>pk.predType==='score' && !pk.hidden && pk.score);
    const counted=picks.length;
    const wt={H:0,A:0,D:0}, scoreCount={};
    picks.forEach(pk=>{ const w=scoreWinner(pk.score); if(w) wt[w]++;
      const sc=clean(pk.score); if(sc) scoreCount[sc]=(scoreCount[sc]||0)+1; });
    let topWinner='H',wmax=-1; ['H','A','D'].forEach(k=>{ if(wt[k]>wmax){wmax=wt[k];topWinner=k;} });
    let topScore=null,smax=0; Object.keys(scoreCount).forEach(k=>{ if(scoreCount[k]>smax){smax=scoreCount[k];topScore=k;} });
    const teamsKnown=!!(f.home && f.away && f.home!=='TBD' && f.away!=='TBD');
    const sideName=s=> s==='H'?f.home : s==='A'?f.away : 'a draw';
    // The single holdout, when everyone but one backs the same winner.
    let lone=null;
    if(counted>=2 && counted-wmax===1) lone=picks.find(pk=>scoreWinner(pk.score)!==topWinner);
    return {
      key:String(f.num), f, counted, teamsKnown, round:f.round||'',
      topWinner, topCount:wmax,
      topShare:counted?wmax/counted:0, topScore, topScoreCount:smax,
      winnerName:sideName(topWinner), loneName:lone?lone.name:'',
      matchup:teamsKnown?`${f.home} v ${f.away}`:'',
    };
  });
}

/* Notable next-day stories. Each detector returns a chip candidate (with a
   0–100 `drama` score) or nothing; we sort by drama and take the top `max`,
   never two chips about the same match or the same player. */
function debriefPreviewStories(nd, ctx, max){
  max=max||2;
  const S=[], add=o=>{ if(o) S.push(o); };
  const ps=nd.stats||[];

  ps.forEach(s=>{
    if(!s.teamsKnown || s.counted<6) return;
    const draw=s.topWinner==='D';

    if(s.topScoreCount===s.counted){
      // Everyone on the exact same scoreline — the boldest call on the board.
      add({id:'unanimousScore',drama:84,icon:'🎯',
        headline:`Whole pool calls ${s.matchup}`,
        dek:`All ${s.counted} picks share one scoreline — ${debriefNiceScore(s.topScore)}. The whole room is right together or wrong together.`,
        link:{matchKey:s.key}});
    } else if(s.topCount===s.counted){
      // Every visible pick on the same result — "everyone's on the same team".
      add({id:'unanimousWinner',drama:70,icon:'🤝',
        headline:`One-way traffic: ${s.matchup}`,
        dek:draw?`All ${s.counted} picks have this one ending in a draw — the whole pool's leaning the same way.`
          :`All ${s.counted} picks have ${s.winnerName} winning — the whole pool's rooting the same way.`,
        link:{matchKey:s.key}});
    } else if(s.loneName){
      // One player against everyone else on the result.
      add({id:'lone',drama:68,icon:'🧩',
        headline:`${s.loneName} stands alone — ${s.matchup}`,
        dek:`Everyone else has ${s.winnerName}; ${s.loneName} is the only one calling it differently.`,
        link:{matchKey:s.key}});
    } else if(s.topShare>=0.75){
      // A heavy crowd lean toward one outcome.
      add({id:'consensus',drama:48+Math.round(s.topShare*20),icon:'🔥',
        headline:`Crowd play: ${s.matchup}`,
        dek:draw?`${s.topCount} of ${s.counted} picks see this one ending level.`
          :`${s.topCount} of ${s.counted} picks back ${s.winnerName} to win.`,
        link:{matchKey:s.key}});
    } else if(s.topShare<=0.5){
      // A genuinely split room — no outcome near a majority.
      add({id:'divided',drama:40+Math.round((0.5-s.topShare)*40),icon:'⚔️',
        headline:`Split house: ${s.matchup}`,
        dek:`The pool can't agree — the picks are split with no clear favorite before kickoff.`,
        link:{matchKey:s.key}});
    }
  });

  // A marquee knockout fixture worth circling, when teams are set.
  if(nd.knockout){
    const head=ps.find(s=>s.teamsKnown);
    if(head) add({id:'marquee',drama:38,icon:'⭐',
      headline:`Headliner: ${head.matchup}`,
      dek:`The pick of the slate — ${nd.round}. Win or go home.`,
      link:{matchKey:head.key}});
  }

  // What the day means at the top of the overall table.
  const st=ctx.standings||[];
  if(st.length>=2){
    const lead=st[0], chaser=st[1], gap=lead.points-chaser.points;
    const yard=ctx.players&&ctx.players[0]?ctx.players[0].points:0;
    const reach=Math.round(yard*1.2);
    if(gap>0 && yard>0 && gap<=reach){
      add({id:'stakes',drama:34+Math.min(20,Math.round((reach-gap)/8)),icon:'📈',
        headline:`Lead on the line`,
        dek:`${chaser.name} sits just ${gap} behind ${lead.name} overall — a big day could swing the top of the table.`,
        link:{playerId:chaser.teamId}});
    }
  }

  S.sort((a,b)=>b.drama-a.drama);
  const out=[], usedFx=new Set(), usedPl=new Set();
  for(const s of S){
    const fk=s.link&&s.link.matchKey, pl=s.link&&s.link.playerId;
    if(fk&&usedFx.has(fk)) continue;
    if(pl&&usedPl.has(pl)) continue;
    out.push(s); if(fk)usedFx.add(fk); if(pl)usedPl.add(pl);
    if(out.length>=max) break;
  }
  return out;
}

function debriefUrl(date){
  try{
    const u=new URL(location.href);
    u.searchParams.set('debrief',date);
    u.hash='';
    return u.toString();
  }catch(e){ return typeof location!=='undefined'?location.href:''; }
}
function debriefDateFromUrl(){
  try{
    const d=new URL(location.href).searchParams.get('debrief');
    return /^\d{4}-\d{2}-\d{2}$/.test(d||'')?d:null;
  }catch(e){ return null; }
}
function debriefEmptyHtml(date){
  const fixtures=debriefFixtures(), days=debriefDays(fixtures);
  const target=date || [...days.values()].filter(d=>d.settled).map(d=>d.date).sort().pop();
  if(target){
    const day=days.get(target), standings=debriefStandingsAsOf(fixtures,target);
    if(day&&day.settled&&!standings){
      return `Scores are final for this recap day.<br>Waiting for the official leaderboard snapshot before writing the Debrief.`;
    }
    if(!day) return `No match day found for ${esc(target)}.<br>Check the shared Debrief link or open the latest edition.`;
  }
  return `No settled match day to report yet.<br>The Daily Debrief drops once the day's last final whistle has blown.`;
}

function debriefShareText(ctx,hero){
  const top=ctx.players[0];
  const tops=(ctx.topPlayers&&ctx.topPlayers.length)?ctx.topPlayers:(top?[top]:[]);
  const lines=[`🗞 The Daily Debrief · ${ctx.dateLabel}`,'',`${hero.icon||'🗞️'} ${hero.headline}`, hero.dek, ''];
  if(top) lines.push(tops.length>1?`🏆 Top score: ${debriefNameList(tops.map(p=>p.name),3)} shared ${top.points} pts`
    :`🏆 Top score: ${top.name} with ${top.points} pts`);
  if(ctx.leader) lines.push(`👑 ${ctx.leader.name} leads overall`);
  lines.push('', debriefUrl(ctx.date));
  return lines.join('\n').trim();
}

function renderDebriefView(){
  const view=topView(); const date=view&&view.date;
  const modal=$('#modal'); const hasback=MODAL_STACK.length>1;
  const ctx=date?debriefContext(date):null;
  if(!ctx){
    modal.innerHTML=`<div class="mhead${hasback?' hasback':''}"><div><h3>🗞 The Daily Debrief</h3><div class="meta">Daily recap</div></div>${modalControls()}</div>`+
      `<div class="mbody"><div class="db-empty">${debriefEmptyHtml(date)}</div></div>`;
    wireModalControls(modal); return;
  }
  const stories=debriefStories(ctx);
  const hero=stories[0];
  const top=ctx.players[0];
  const tops=(ctx.topPlayers&&ctx.topPlayers.length)?ctx.topPlayers:(top?[top]:[]);
  const dayPtsFor=id=>{ const p=ctx.players.find(x=>x.teamId===id); return p?p.points:0; };
  const c=ctx.topClimber, f=ctx.topFaller;
  const low=ctx.players.length>=4?ctx.players[ctx.players.length-1]:null;
  const toughShow=!!debriefToughDecision(ctx);
  const calls=ctx.bestCalls||[], bc=calls[0];
  const mvpIds=new Set(tops.map(p=>p.teamId));
  const showPod=bc && calls.length<=5 && (calls.length>1 || !mvpIds.has(bc.owner.teamId));
  const podClub=calls.length>3, podExact=calls.every(c=>c.pk.exact);
  // Sidebar = runner-up stories, minus the hero and minus the ones already given
  // their own dedicated card: 'daywinner' (MVP), 'climber'/'faller' (On the move).
  // Also dedupe by target so two stories don't point at the same match/player, or
  // pile extra attention onto someone already carrying a visible card.
  const covered=['daywinner','climber','faller'];
  const seenTargets=new Set();
  const podTargets=new Set(showPod?calls.map(call=>String(call.f.num)):[]);
  const heroTarget=debriefStoryTarget(hero);
  if(heroTarget) seenTargets.add(heroTarget);
  tops.forEach(p=>seenTargets.add(p.teamId));
  if(c) seenTargets.add(c.teamId);
  if(f) seenTargets.add(f.teamId);
  // Only reserve the low scorer when the tough card actually shows — when it's
  // suppressed (not notable, or fatigued) they're free to surface elsewhere.
  if(low && toughShow) seenTargets.add(low.teamId);
  const sidebar=[];
  for(const s of stories){
    if(s.id===hero.id || covered.includes(s.id)) continue;
    const t=debriefStoryTarget(s);
    if(t && podTargets.has(t) && ['bullseye','goalfest'].includes(s.id)) continue;
    if(t && seenTargets.has(t)) continue;
    if(t) seenTargets.add(t);
    sidebar.push(s);
    if(sidebar.length>=5) break;
  }
  view._ctx=ctx; view._hero=hero;

  const mvp=top?`
    <div class="db-spot db-mvp${tops.length>1?' db-static':''}"${tops.length===1?debriefLinkAttr({playerId:top.teamId}):''}>
      <div class="db-av">${tops.length>1?tops.length:esc((top.name||'?').slice(0,1).toUpperCase())}</div>
      <div class="db-who">
        <div class="db-lbl">${tops.length>1?'Shared MVP':'MVP'}</div>
        <div class="db-nm">${tops.length>1?esc(debriefNameList(tops.map(p=>p.name),3)):esc(top.name)}</div>
        <div class="db-sub">${debriefMvpLine(ctx)}</div>
      </div>
      <div class="db-big">${top.points}<small>points</small></div>
    </div>`:'';

  // The sharpest single prediction — separate from MVP, and only shown when it
  // has a clear winner or a small tie. Four or five exacts become a small club
  // moment instead of pretending one pick was "the" pick.
  const podSummary=showPod?debriefCallSummary(calls,podClub?1:2):'';
  const pod=showPod?`
    <div class="db-spot db-pod${calls.length>1?' db-static':''}"${calls.length===1?debriefLinkAttr({playerId:bc.owner.teamId}):''}>
      <div class="db-av">${calls.length>1?calls.length:esc((bc.owner.name||'?').slice(0,1).toUpperCase())}</div>
      <div class="db-who">
        <div class="db-lbl">${podClub?'Bullseye club':calls.length>1?'Shared pick':'Pick of the day'}</div>
        <div class="db-nm">${podClub?`${calls.length} players`:esc(debriefNameList(calls.map(c=>c.owner.name),3))}</div>
        <div class="db-sub">${podExact?'Exact calls:':'Top call:'} ${esc(podSummary)}</div>
      </div>
      <div class="db-big">+${bc.points}<small>${bc.pk.exact?'exact':'points'}</small></div>
    </div>`:'';

  // Day's biggest rank riser & steepest faller vs the previous settled board —
  // always shown (adapted from the main board's movers strip). On opening day
  // there's no prior board to compare, so we say so.
  let moversHtml;
  if(!ctx.prevById){
    moversHtml=`<div class="db-movers"><div class="db-mov flat"><div class="db-mov-sub">Opening day: the first table is on the board. Movement starts next settled day.</div></div></div>`;
  } else if(!c && !f){
    moversHtml=`<div class="db-movers"><div class="db-mov flat"><div class="db-mov-sub">The board held its shape: same places, new points.</div></div></div>`;
  } else {
    const riser=c?`
      <div class="db-mov up"${debriefLinkAttr({playerId:c.teamId})}>
        <div class="db-mov-row"><span class="db-mov-tag">Riser</span><span class="db-mov-chg">▲${c.delta}</span></div>
        <div class="db-mov-nm">${esc(c.name)}</div>
        <div class="db-mov-sub">${ordinal(c.rank)} overall · +${dayPtsFor(c.teamId)} today</div>
      </div>`:`
      <div class="db-mov up"><div class="db-mov-row"><span class="db-mov-tag">Riser</span></div><div class="db-mov-nm">No climber</div><div class="db-mov-sub">Nobody gained rank today</div></div>`;
    const faller=f?`
      <div class="db-mov down"${debriefLinkAttr({playerId:f.teamId})}>
        <div class="db-mov-row"><span class="db-mov-tag">Slide</span><span class="db-mov-chg">▼${Math.abs(f.delta)}</span></div>
        <div class="db-mov-nm">${esc(f.name)}</div>
        <div class="db-mov-sub">${ordinal(f.rank)} overall · +${dayPtsFor(f.teamId)} today</div>
      </div>`:`
      <div class="db-mov down"><div class="db-mov-row"><span class="db-mov-tag">Slide</span></div><div class="db-mov-nm">No slide</div><div class="db-mov-sub">Nobody gave up rank today</div></div>`;
    moversHtml=`<div class="db-movers">${riser}${faller}</div>`;
  }

  // Soft reset-day note (lowest day score). Only when it's a genuine standout
  // (debriefToughDecision: a blank, a lone outlier, or well below average) and
  // not repeating — never the same person within 3 days, and not two settled
  // days running.
  const tough=toughShow?`
    <div class="db-spot tough"${debriefLinkAttr({playerId:low.teamId})}>
      <div class="db-av">${esc((low.name||'?').slice(0,1).toUpperCase())}</div>
      <div class="db-who">
        <div class="db-lbl">Tough day</div>
        <div class="db-nm">${esc(low.name)}</div>
        <div class="db-sub">Lowest score today with ${low.points} pts${low.exacts?` — but still found an exact score` : ''}. Next match is a reset!</div>
      </div>
    </div>`:'';

  // Keep the day's recap from looking thin without letting it sprawl: the awards
  // row holds at most three "today" cards (MVP/pick/tough are the dedicated ones)
  // plus the single "Next up" card — four max, which is what fits the mobile
  // layout. When the dedicated cards don't reach three, promote the strongest
  // runner-up stories out of the "Also today" list to fill the gap. sidebar is
  // drama/balance sorted and rotates day to day via the fatigue weighting, so the
  // promoted picks vary; whatever's left stays in "Also today".
  const dayCards=(top?1:0)+(showPod?1:0)+(toughShow?1:0);
  const promoteN=Math.max(0,Math.min(3-dayCards,sidebar.length));
  const promoted=sidebar.slice(0,promoteN);
  const rest=sidebar.slice(promoteN,promoteN+3);
  const promotedHtml=promoted.map(s=>`
    <div class="db-spot db-storyspot${s.link?'':' db-static'}"${debriefLinkAttr(s.link)}>
      <div class="db-av" aria-hidden="true">${s.icon||'🗞️'}</div>
      <div class="db-who">
        <div class="db-lbl">${esc(debriefStoryTag(s.id))}</div>
        <div class="db-nm">${esc(s.headline)}</div>
        <div class="db-sub">${esc(s.dek)}</div>
      </div>
    </div>`).join('');

  const sidebarHtml=rest.length?`
    <div class="db-section-title">Also today</div>
    <div class="db-stories">${rest.map(s=>`
      <div class="db-story${s.link?' link':''}"${debriefLinkAttr(s.link)}>
        <div class="db-stx"><div class="db-sh">${esc(s.headline)}</div><div class="db-sd">${esc(s.dek)}</div></div>
      </div>`).join('')}</div>`:'';

  const wild=ctx.fixtureStats.slice().sort((a,b)=>b.totalGoals-a.totalGoals)[0];
  const nums=`
    <section class="db-panel">
      <h4>By the numbers</h4>
      <div class="db-nums">
        <div class="db-num"><div class="k">Top score</div><div class="v">${top?top.points:'—'} <small>${tops.length?esc(debriefNameList(tops.map(p=>p.name),2)):''}</small></div></div>
        <div class="db-num"><div class="k">Bullseyes</div><div class="v">${ctx.poolExacts} <small>exact</small></div></div>
        <div class="db-num"><div class="k">Average</div><div class="v">${ctx.avgDay} <small>pts</small></div></div>
        <div class="db-num"><div class="k">Wildest</div><div class="v sm">${wild?esc(wild.matchup):'—'}</div></div>
      </div>
    </section>`;

  const standHtml=`
    <section class="db-panel">
      <h4>Standings shift</h4>
      <div class="db-stand">${ctx.standings.slice(0,5).map(r=>{
        const was=ctx.prevById?ctx.prevById[r.teamId]:null;
        const delta=was?was.rank-r.rank:0;
        const mv=!was?{c:'same',t:'NEW'}:delta>0?{c:'up',t:'▲'+delta}:delta<0?{c:'down',t:'▼'+Math.abs(delta)}:{c:'same',t:'—'};
        return `<div class="db-srow"${debriefLinkAttr({playerId:r.teamId})} style="cursor:pointer">
          <span class="r">${r.rank}</span><span class="sn">${esc(r.name)}</span>
          <span class="sp">${r.points}</span><span class="mv ${mv.c}">${mv.t}</span></div>`;
      }).join('')}</div>
    </section>`;

  // The next day's slate, shown in two places (only while a next day exists):
  //  • a prominent "Next up" card up with the day's awards, featuring the single
  //    biggest story (or a slate teaser when nothing stands out);
  //  • the fuller "On deck" panel at the bottom — the slate line plus whichever
  //    notable chips weren't already promoted to the card, so nothing repeats.
  let nextUpHtml='', onDeckHtml='';
  if(ctx.nextDay){
    const nd=ctx.nextDay;
    // debriefPreviewStories already returns a drama-sorted list with no two
    // chips sharing a match or player, so slicing it gives us disjoint sets:
    // the single featured chip for the "Next up" card, and the next two for the
    // "On deck" panel — nothing repeats across the card and the panel.
    const stories=debriefPreviewStories(nd,ctx,3);
    const feat=stories[0]||null;
    const rest=stories.slice(1,3);
    const short=debriefDateLabel(nd.date,'short');

    // ---- Next up card (awards row) ----
    let icon,nm,sub,link=null;
    if(feat){ icon=feat.icon; nm=feat.headline; sub=feat.dek; link=feat.link; }
    else {
      const head=nd.stats.find(s=>s.teamsKnown);
      icon=nd.knockout?'⭐':'📅';
      nm=nd.allTbd?nd.round:(head?head.matchup:nd.round);
      sub=nd.allTbd?'The bracket is still taking shape.':`${nd.matchCount} ${matchWord(nd.matchCount)} on the card.`;
      if(head) link={matchKey:head.key};
    }
    const nextAttr=link?debriefLinkAttr(link):'';
    nextUpHtml=`
      <div class="db-spot db-next${link?'':' db-static'}"${nextAttr}>
        <div class="db-av" aria-hidden="true">${icon}</div>
        <div class="db-who">
          <div class="db-lbl">Next up · ${esc(short)}</div>
          <div class="db-nm">${esc(nm)}</div>
          <div class="db-sub">${esc(sub)}</div>
        </div>
        <div class="db-big">${nd.matchCount}<small>${matchWord(nd.matchCount)}</small></div>
      </div>`;

    // ---- On deck panel (bottom) ----
    const anchor=`${esc(nd.dateLabel)} · ${nd.matchCount} ${matchWord(nd.matchCount)}${nd.knockout?` · ${esc(nd.round)}`:''}`;
    const chipHtml=rest.map(s=>`
      <div class="db-onchip${s.link?' link':''}"${debriefLinkAttr(s.link)}>
        <span class="db-onic" aria-hidden="true">${s.icon}</span>
        <div class="db-ontx"><div class="db-onh">${esc(s.headline)}</div><div class="db-ond">${esc(s.dek)}</div></div>
      </div>`).join('');
    const note=!feat && nd.allTbd
      ? `<div class="db-onnote">${esc(nd.round)} begins — the bracket is still taking shape.</div>` : '';
    onDeckHtml=`
      <section class="db-panel db-ondeck">
        <h4>On deck</h4>
        <div class="db-ondeck-line">${anchor}</div>
        ${chipHtml?`<div class="db-onchips">${chipHtml}</div>`:''}${note}
      </section>`;
  }

  modal.innerHTML=`
    <div class="mhead db-head${hasback?' hasback':''}">
      <div><h3>The Daily Debrief</h3><div class="meta">${esc(ctx.dateLabel)} · ${esc(ctx.round)}</div></div>
      ${modalControls()}
    </div>
    <div class="mbody">
      <div class="db-wrap">
        <div class="db-dateline">Edition ${ctx.edition} · Final whistle recap</div>
        <div class="db-hero${hero.link?' link':''}"${debriefLinkAttr(hero.link)}>
          <h2>${esc(hero.headline)}</h2>
          <div class="dek">${esc(hero.dek)}</div>
        </div>
        ${moversHtml}
        <div class="db-awards">${mvp}${pod}${promotedHtml}${tough}${nextUpHtml}</div>
        ${sidebarHtml}
        <div class="db-lower">${nums}${standHtml}</div>
        ${onDeckHtml}
        <div class="db-share">
          <button type="button" class="primary" id="dbShare">Share headline</button>
        </div>
        <div class="db-foot">Tap a story or name to dig into the detail.</div>
      </div>
    </div>`;
  wireModalControls(modal);
  const sh=modal.querySelector('#dbShare');
  if(sh) sh.addEventListener('click',()=>debriefShare(sh));
}

function debriefShare(btn){
  const view=topView(); if(!view||!view._ctx) return;
  const text=debriefShareText(view._ctx,view._hero);
  const done=()=>{ const prev=btn.textContent; btn.classList.add('ok'); btn.textContent='✓ Copied to clipboard';
    setTimeout(()=>{ btn.classList.remove('ok'); btn.textContent=prev; },1700); };
  if(navigator.share){ navigator.share({title:'The Daily Debrief',text}).catch(()=>{}); return; }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done)); }
  else fallbackCopy(text,done);
}
function fallbackCopy(text,done){
  try{ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done&&done(); }catch(e){}
}

/* The Debrief uses one canonical UTC-cutoff clock for buckets, history
   snapshots, and publish timing. Source scrape timestamps are UTC, so the
   recap clock is UTC too. Returns the current Debrief date (YYYY-MM-DD) and
   UTC hour (0-23). */
function debriefNow(){
  const now=new Date();
  let date,hour;
  date=debriefDayKey(now.toISOString());
  try{
    const h=new Intl.DateTimeFormat('en-US',{timeZone:DEBRIEF_TZ,hour:'numeric',hourCycle:'h23'})
      .formatToParts(now).find(p=>p.type==='hour');
    hour=h?+h.value:now.getHours();
  }catch(e){ hour=now.getHours(); }
  return {date,hour};
}

/* The most recent fully-settled UTC-cutoff day that is also safe to publish, or null
   before any day qualifies. A day is publishable only once it is fully Final
   and the UTC cutoff has ticked into a later Debrief date. So an edition is
   never "written" on a day whose games might still be settling; today's recap
   drops once its last whistle is truly final and the canonical day has rolled
   over. */
function latestSettledDay(){
  const fixtures=debriefFixtures();
  const days=debriefDays(fixtures);
  const utcToday=debriefNow().date;
  const ds=[...days.values()]
    .filter(d=>d.settled && d.date<utcToday && debriefStandingsAsOf(fixtures,d.date))
    .map(d=>d.date).sort();
  return ds.length?ds[ds.length-1]:null;
}
function debriefSeen(date){ try{ return !!localStorage.getItem('wc_recap_seen_'+date); }catch(e){ return false; } }
function openDebrief(date){
  date=date||latestSettledDay(); if(!date) return;
  openModalView({type:'debrief',date,render:renderDebriefView,refresh:renderDebriefView,scroll:0});
  try{ localStorage.setItem('wc_recap_seen_'+date,'1'); }catch(e){}
  syncDebriefButton();
}
/* Auto-pop window on the Debrief's canonical UTC clock: from the daily cutoff
   through the next 13 hours. */
function debriefAutoWindowOpen(){
  const hour=debriefNow().hour;
  const elapsed=(hour-DEBRIEF_DAY_CUTOFF_HOURS+24)%24;
  return elapsed<13;
}
/* Auto-pop once per canonical UTC-cutoff day, the first time the app opens
   after that day has truly settled (every fixture Final) and cleared the UTC
   publish gate, but only during the cutoff-relative window. The date-keyed flag
   means it never nags twice for the same day. */
function maybeAutoDebrief(){
  const date=latestSettledDay(); if(!date) return;
  if(!debriefAutoWindowOpen()) return;
  if(!debriefSeen(date)) openDebrief(date);
}
/* Keep the header button in sync: hidden until a day settles, with a "new" dot
   and gentle glow until that day's edition has been opened. */
function syncDebriefButton(){
  const btn=$('#openDebriefTop'); if(!btn) return;
  const date=latestSettledDay();
  if(!date){ btn.style.display='none'; return; }
  btn.style.display='';
  const unseen=!debriefSeen(date);
  btn.classList.toggle('glow',unseen);
  const dot=btn.querySelector('.ndot'); if(dot) dot.style.display=unseen?'':'none';
}

/* ---------------- Modal stack ----------------
   One overlay, many stacked views. Opening a match popup from inside the
   player sheet or the results list pushes a new view and shows a ‹ Back button
   that returns you exactly where you came from; Esc / overlay-click pop one
   level. Each view exposes a light `refresh()` used by the 20s live tick and
   manual Refresh so live scores update in place without resetting scroll or
   filters. */
let MODAL_STACK=[];
function topView(){ return MODAL_STACK[MODAL_STACK.length-1]||null; }
// .mbody is the per-view scroll container now (the header stays pinned), so
// scroll save/restore tracks it rather than the overlay.
function modalScroller(){ const m=$('#modal'); return m?m.querySelector('.mbody'):null; }
function lockModalScrollAxis(){
  const sc=modalScroller();
  if(!sc || sc.dataset.axisLocked) return sc;
  sc.dataset.axisLocked='1';
  sc.addEventListener('scroll',()=>{
    if(sc.scrollLeft) sc.scrollLeft=0;
  },{passive:true});
  return sc;
}
function openModalView(view){
  const overlay=$('#overlay');
  if(MODAL_STACK.length){ const sc=modalScroller(); MODAL_STACK[MODAL_STACK.length-1].scroll=sc?sc.scrollTop:0; }
  destroyCharts();
  MODAL_STACK.push(view);
  view.render();
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  const sc=lockModalScrollAxis(); if(sc){ sc.scrollLeft=0; sc.scrollTop=0; }
}
function popModal(){
  if(MODAL_STACK.length<=1){ closeModal(); return; }
  destroyCharts();
  MODAL_STACK.pop();
  const v=topView();
  v.render();
  const sc=lockModalScrollAxis(); if(sc){ sc.scrollLeft=0; sc.scrollTop=v.scroll||0; }
}
/* Back (only when something sits beneath) + close, shared by every view. */
function modalControls(){
  const back=MODAL_STACK.length>1?`<button class="mback" type="button" aria-label="Go back">‹ Back</button>`:'';
  return back+`<button class="close" type="button" aria-label="Close">×</button>`;
}
function wireModalControls(modal){
  const b=modal.querySelector('.mback'); if(b) b.addEventListener('click',popModal);
  modal.querySelector('.close').addEventListener('click',closeModal);
}

/* Full Schedule: every match in a modal, grouped by round in chronological
   order, with an All / Upcoming / Completed segmented filter and the shared
   timezone picker. */
let SCHED_MODE='upcoming';   // 'all' | 'upcoming' | 'completed'
let SCHED_TODAY=false;
function openResults(){
  SCHED_MODE='upcoming';
  SCHED_TODAY=false;
  openModalView({type:'results',render:renderResultsView,refresh:refreshResultsView,scroll:0});
}
function schedCounts(all){
  const scoped=SCHED_TODAY?all.filter(matchIsToday):all;
  return {total:all.length, all:scoped.length,
    upcoming:scoped.filter(matchIsUpcomingOrLive).length,
    completed:scoped.filter(matchIsCompletedOrPast).length,
    today:all.filter(matchIsToday).length};
}
/* Just the grouped match rows for the current filter — recomputed on each live
   tick, but injected into the existing .mbody so the toolbar (and its thumb)
   and the scroll position survive. */
function schedBody(all){
  const ms=all.filter(m=>matchesScheduleFilters(m,SCHED_MODE,SCHED_TODAY));
  const groups=[], idx={};
  ms.forEach(m=>{
    const r=m.round||'Matches';
    if(!(r in idx)){ idx[r]=groups.length; groups.push({round:r,items:[]}); }
    groups[idx[r]].items.push(m);
  });
  let body='';
  groups.forEach(g=>{
    g.items.sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
    body+=`<div class="group"><div class="grouphd"><span class="gr">${esc(g.round)}</span>`+
      `<span class="gsub">${g.items.length} match${g.items.length===1?'':'es'}</span></div>`;
    g.items.forEach(m=>body+=resRow(m));
    body+=`</div>`;
  });
  return body||'<div class="empty">No matches in this filter.</div>';
}
// Build the whole modal shell once (on open / Back). The live tick uses the
// lighter refreshResultsView() below instead, so it never rebuilds the toolbar.
function renderResultsView(){
  const all=allMatches();
  const counts=schedCounts(all);
  const hasback=MODAL_STACK.length>1;
  const seg=(mode,label)=>`<button class="seg ${SCHED_MODE===mode?'active':''}" type="button" role="tab" aria-selected="${SCHED_MODE===mode}" data-mode="${mode}">${label}<span class="cnt">${counts[mode]}</span></button>`;
  const modal=$('#modal');
  modal.innerHTML=`
    <div class="mhead${hasback?' hasback':''}">
      <div><h3>Full Schedule</h3><div class="meta">${counts.total} matches · tap any match to see everyone's pick</div></div>
      ${modalControls()}
    </div>
    <div class="sched-tools">
      <div class="segmented" id="schedSeg" role="tablist" aria-label="Filter matches">
        <span class="seg-thumb" aria-hidden="true"></span>
        ${seg('all','All')}${seg('upcoming','Upcoming')}${seg('completed','Completed')}
      </div>
      <button class="tog ${SCHED_TODAY?'on':''}" id="schedToday" type="button" aria-pressed="${SCHED_TODAY}">📅 Today${counts.today?`<span class="cnt">${counts.today}</span>`:''}</button>
      <label class="tzpick" for="tzSelectModal">
        <span class="ic">🕒</span>
        <select id="tzSelectModal" aria-label="Display timezone">${tzOptionsHTML()}</select>
      </label>
    </div>
    <div class="mbody">${schedBody(all)}</div>`;
  wireModalControls(modal);
  const segEl=modal.querySelector('#schedSeg');
  // Switching filters updates only the active state, the rows, and the thumb —
  // so the pill slides smoothly between options instead of snapping from 0.
  segEl.querySelectorAll('.seg').forEach(b=>b.addEventListener('click',()=>{
    if(SCHED_MODE===b.dataset.mode) return;
    SCHED_MODE=b.dataset.mode;
    segEl.querySelectorAll('.seg').forEach(x=>{
      const on=x.dataset.mode===SCHED_MODE;
      x.classList.toggle('active',on);
      x.setAttribute('aria-selected',on);
    });
    modal.querySelector('.mbody').innerHTML=schedBody(allMatches());
    positionThumb(segEl);
  }));
  const todayBtn=modal.querySelector('#schedToday');
  todayBtn.addEventListener('click',()=>{
    SCHED_TODAY=!SCHED_TODAY;
    todayBtn.classList.toggle('on',SCHED_TODAY);
    todayBtn.setAttribute('aria-pressed',SCHED_TODAY);
    refreshResultsView();
  });
  modal.querySelector('#tzSelectModal').addEventListener('change',e=>setTZ(e.target.value));
  requestAnimationFrame(()=>positionThumb(segEl));
}
/* Live-tick / manual refresh: update the counts and rows in place, leaving the
   toolbar, the segmented thumb, and the scroll position untouched. (Rebuilding
   the whole modal here was what made the thumb snap to the left and re-slide
   every 20s — most visible on Upcoming/Completed, where the thumb is offset.) */
function refreshResultsView(){
  const modal=$('#modal');
  const segEl=modal.querySelector('#schedSeg');
  if(!segEl){ renderResultsView(); return; }   // not actually the results view
  const all=allMatches();
  const counts=schedCounts(all);
  segEl.querySelectorAll('.seg').forEach(b=>{ const c=b.querySelector('.cnt'); if(c) c.textContent=counts[b.dataset.mode]; });
  const todayBtn=modal.querySelector('#schedToday');
  if(todayBtn){
    const c=todayBtn.querySelector('.cnt');
    if(c) c.textContent=counts.today;
    else if(counts.today) todayBtn.insertAdjacentHTML('beforeend',`<span class="cnt">${counts.today}</span>`);
    const c2=todayBtn.querySelector('.cnt');
    if(c2) c2.style.display=counts.today?'':'none';
    todayBtn.classList.toggle('on',SCHED_TODAY);
    todayBtn.setAttribute('aria-pressed',SCHED_TODAY);
  }
  const meta=modal.querySelector('.mhead .meta');
  if(meta) meta.textContent=`${counts.total} matches · tap any match to see everyone's pick`;
  const mbody=modal.querySelector('.mbody');
  if(mbody) mbody.innerHTML=schedBody(all);
  positionThumb(segEl);   // counts can change width; re-align without snapping
}
function resRow(m){
  const sc=parseScore(m.score);
  const when=fmtFixture(m.kickoff);
  const hw=sc&&sc.h>sc.a, aw=sc&&sc.a>sc.h;
  // Status badge (top-left). Kickoff date + time always render beneath it — so
  // even finished games show when they were played, in the chosen timezone.
  let badge, result;
  if(m.live){
    badge='<span class="st live"><span class="livedot"></span>LIVE</span>';
    result=`<span class="rr-score live">${sc?sc.h+' - '+sc.a:'0 - 0'}</span>`;
  }else if(m.done&&sc){
    badge='<span class="st ft">FT</span>';
    result=`<span class="rr-score">${sc.h} - ${sc.a}</span>`;
  }else{
    badge='<span class="st ns">Upcoming</span>';
    result='<span class="rr-vs">vs</span>';
  }
  const dateLine=(when.date&&when.date!=='TBD')?`<div class="rr-date">${esc(when.date)}</div>`:'';
  const timeLine=when.time?`<div class="rr-time">${esc(when.time)}</div>`:'';
  return `<div class="resrow ${m.live?'live':''}" data-match-key="${esc(m.key)}" role="button" tabindex="0" title="See every player's prediction for this match">
    <div class="rr-when">${badge}${dateLine}${timeLine}</div>
    <div class="rr-teams">
      <div class="rr-team ${hw?'win':''}">${flagImg(m.homeCode,'flag sm')}<span class="tn">${esc(m.home)}</span></div>
      <div class="rr-team ${aw?'win':''}">${flagImg(m.awayCode,'flag sm')}<span class="tn">${esc(m.away)}</span></div>
    </div>
    <div class="rr-result">${result}</div>
  </div>`;
}

/* ---------------- Player detail ---------------- */

/* Build one player's points / rank / exact series for the charts.

   The upstream site nudges a player's live total mid-match, and that
   provisional value often settles to something different at full time — so we
   can't just plot every scrape (that's the "wobble" we want to exclude). But
   restricting to whole snapshots flagged `settled` is too blunt: during a busy
   evening almost every hourly scrape lands inside SOME fixture's window, so the
   series collapsed to just start → latest and hid every real intermediate step.

   Instead we trust a reading per-player when EITHER:
     • its snapshot is settled (no match in progress at capture), OR
     • it is confirmed by the next scrape (the value held steady to the
       following reading) — a genuine post-game total persists across scrapes,
       while a one-scrape provisional blip never matches its neighbour.
   We then collapse to step only on real changes, so each finished game shows as
   its own step (e.g. fell 2 after one game, rose 1 after the next). Finally we
   append the current live standing as a "now" point so the chart tip always
   reflects where the player stands right now. Working per-player also filters
   rank wobble caused by OTHER players' mid-match blips. */
const readingSig=p=>p?`${p.points}|${p.rank}|${p.exact}`:null;

/* One player's confirmed settled readings, oldest→newest, collapsed so each
   entry is a genuine scoring change. Shared by the charts and the movers strip
   so both filter mid-match wobble the same way. */
function confirmedReadings(teamId){
  const H=(HISTORY||[]).filter(s=>s&&Array.isArray(s.players));
  const raw=H.map(s=>{
    const p=s.players.find(x=>x.team_id===teamId);
    return {ts:s.timestamp, settled:s.settled!==false, p:p?{points:p.points,rank:p.rank,exact:p.exact}:null};
  });
  const trusted=[];
  for(let i=0;i<raw.length;i++){
    const r=raw[i]; if(!r.p) continue;
    const nxt=raw[i+1];
    if(r.settled || (nxt&&nxt.p&&readingSig(nxt.p)===readingSig(r.p))) trusted.push(r);
  }
  const steps=[]; let prev=null;
  trusted.forEach(r=>{ const g=readingSig(r.p); if(g!==prev){ steps.push(r); prev=g; } });
  return steps;
}

function playerSeries(teamId){
  const steps=confirmedReadings(teamId);
  const labels=[],pts=[],ranks=[],exact=[];
  steps.forEach(r=>{ labels.push(shortStamp(r.ts)); pts.push(r.p.points); ranks.push(r.p.rank); exact.push(r.p.exact); });

  // Append the live "now" standing when it diverges from the last settled step.
  let live=false;
  const cur=(RANKINGS.players||[]).find(p=>p.team_id===teamId);
  if(cur){
    const curp={points:cur.points,rank:cur.rank,exact:cur.exact};
    const last=steps.length?steps[steps.length-1].p:null;
    if(!last || readingSig(last)!==readingSig(curp)){
      labels.push('now'); pts.push(cur.points); ranks.push(cur.rank); exact.push(cur.exact); live=true;
    }
  }
  return {labels,pts,ranks,exact,steps:steps.length,live};
}

function pointsTodayTag(teamId){
  const cur=(RANKINGS.players||[]).find(p=>p.team_id===teamId);
  if(!cur) return {cls:'same',txt:'—',title:''};

  const today=dayKey(Date.now());
  const steps=confirmedReadings(teamId);
  let base=null;
  for(let i=steps.length-1;i>=0;i--){
    if(dayKey(steps[i].ts)<today){ base=steps[i]; break; }
  }

  // Prefer the same confirmed readings as the chart. If there is no confirmed
  // pre-today step yet, fall back to the latest raw scrape before today.
  if(!base){
    const raw=(HISTORY||[]).filter(s=>s&&Array.isArray(s.players)&&dayKey(s.timestamp)<today);
    for(let i=raw.length-1;i>=0;i--){
      const p=raw[i].players.find(x=>x.team_id===teamId);
      if(p){ base={ts:raw[i].timestamp,p}; break; }
    }
  }

  if(!base) return {cls:'same',txt:'today —',title:'No previous-day baseline yet'};
  const delta=cur.points-base.p.points;
  const title=`Since ${shortStamp(base.ts)}`;
  if(delta>0) return {cls:'up',txt:'▲ +'+delta+' today',title};
  if(delta<0) return {cls:'down',txt:'▼ '+Math.abs(delta)+' today',title};
  return {cls:'same',txt:'0 today',title};
}

function trendTag(arr){
  const v=arr.filter(x=>x!=null);
  if(v.length<2) return {cls:'same',txt:'—'};
  const d=v[v.length-1]-v[0];
  if(d>0) return {cls:'up',txt:'▲ +'+d+' since start'};
  if(d<0) return {cls:'down',txt:'▼ '+d+' since start'};
  return {cls:'same',txt:'no change'};
}
function rankTrendTag(arr){
  const v=arr.filter(x=>x!=null);
  if(v.length<2) return {cls:'same',txt:'—'};
  const d=v[0]-v[v.length-1]; // positive = improved
  if(d>0) return {cls:'up',txt:'▲ up '+d};
  if(d<0) return {cls:'down',txt:'▼ down '+Math.abs(d)};
  return {cls:'same',txt:'holding'};
}

function fixtureCounts(teamId){
  const c={all:0,upcoming:0,completed:0,today:0};
  const pdata=PRED[teamId]; if(!pdata||!pdata.matchdays) return c;
  pdata.matchdays.forEach(md=>(md.fixtures||[]).forEach(fx=>{
    c.all++;
    if(matchIsCompletedOrPast(fx)) c.completed++; else c.upcoming++;
    if(matchIsToday(fx)) c.today++;
  }));
  return c;
}

function buildFilters(teamId){
  const f=$('#filters');
  const c=fixtureCounts(teamId);
  const seg=(mode,label,n)=>{
    const on=FILTERS.mode===mode;
    return `<button class="seg ${on?'active':''}" role="tab" aria-selected="${on}" data-mode="${mode}">${label}<span class="cnt">${n}</span></button>`;
  };
  f.innerHTML=`
    <div class="segmented" role="tablist" aria-label="Filter matches">
      <span class="seg-thumb" aria-hidden="true"></span>
      ${seg('all','All',c.all)}
      ${seg('upcoming','<span class="seg-long">Upcoming & Live</span><span class="seg-short">Upcoming</span>',c.upcoming)}
      ${seg('completed','Completed',c.completed)}
    </div>
    <button class="tog ${FILTERS.today?'on':''}" data-k="today" aria-pressed="${FILTERS.today}">📅 Today${c.today?`<span class="cnt">${c.today}</span>`:''}</button>`;
  f.querySelectorAll('.seg').forEach(b=>b.addEventListener('click',()=>{
    if(FILTERS.mode===b.dataset.mode) return;
    FILTERS.mode=b.dataset.mode;
    f.querySelectorAll('.seg').forEach(x=>{
      const on=x.dataset.mode===FILTERS.mode;
      x.classList.toggle('active',on);
      x.setAttribute('aria-selected',on);
    });
    positionSegThumb();
    renderSheetCurrent();
  }));
  const tg=f.querySelector('.tog');
  if(tg) tg.addEventListener('click',()=>{
    FILTERS.today=!FILTERS.today;
    tg.classList.toggle('on');
    tg.setAttribute('aria-pressed',FILTERS.today);
    renderSheetCurrent();
  });
}

/* Slide + size the segmented-control thumb under the active option. Run after
   the modal is visible (offsetWidth is 0 while the overlay is display:none). */
function positionThumb(seg){
  if(!seg) return;
  const thumb=seg.querySelector('.seg-thumb');
  const active=seg.querySelector('.seg.active');
  if(!thumb||!active) return;
  thumb.style.width=active.offsetWidth+'px';
  thumb.style.transform=`translateX(${active.offsetLeft}px)`;
}
function positionSegThumb(){ positionThumb(document.querySelector('#filters .segmented')); }
window.addEventListener('resize',()=>{
  positionSegThumb();
  positionThumb(document.querySelector('#mpSort'));
  positionThumb(document.querySelector('#schedSeg'));
});
let CURRENT_TEAM=null;
function renderSheetCurrent(){ if(CURRENT_TEAM) renderSheet(CURRENT_TEAM); }

function isCompleted(fx){ return (fx.status||'').toUpperCase()==='FT'; }
function kickoffMs(item){
  const iso=item&&(item.kickoff_utc||item.kickoff);
  if(!iso) return NaN;
  const ms=new Date(iso).getTime();
  return isNaN(ms)?NaN:ms;
}
function hasMatchScore(item){
  return !!parseScore(item&&(item.actual_score||item.score));
}
function isPastHardCap(item){
  const ko=kickoffMs(item);
  return !isNaN(ko) && Date.now()>=ko+LIVE_HARD_CAP_MS;
}
/* Filtering uses a slightly broader "completed/past" bucket than scoring does:
   a stale non-FT row with a real score and a kickoff far in the past should not
   keep living under Upcoming & Live. Exact/scoring UI still keys off true FT. */
function matchIsCompletedOrPast(item){
  return !!(item&&(item.done||isCompleted(item)||(isPastHardCap(item)&&hasMatchScore(item))));
}
function matchIsUpcomingOrLive(item){ return !matchIsCompletedOrPast(item); }
function matchIsToday(item){ return !!(item&&isSameLocalDay(item.kickoff_utc||item.kickoff)); }
function matchesScheduleFilters(item,mode,todayOnly){
  if(todayOnly && !matchIsToday(item)) return false;
  if(mode==='completed') return matchIsCompletedOrPast(item);
  if(mode==='upcoming') return matchIsUpcomingOrLive(item);
  return true;
}

function exactRate(teamId,base={}){
  const pdata=PRED[teamId];
  const fixtures=(pdata?.matchdays||[]).flatMap(md=>md.fixtures||[]);
  const done=fixtures.filter(isCompleted);
  const completed=done.length;
  const exact=completed?done.filter(fx=>fx.is_exact).length:(base.exact??pdata?.exact??0);
  const pct=completed?exact/completed*100:0;
  return {
    exact,
    completed,
    pct,
    label:completed?`${exact} / ${completed} · ${pct.toFixed(1)}%`:'0 / 0 · 0.0%',
    shortLabel:completed?`${exact}/${completed} · ${Math.round(pct)}%`:'0/0 · 0%'
  };
}

function renderSheet(teamId){
  CURRENT_TEAM=teamId;
  const pdata=PRED[teamId];
  const host=$('#sheet');
  if(!pdata||!pdata.matchdays||!pdata.matchdays.length){
    host.innerHTML=`<div class="empty">No prediction data scraped for this player yet.</div>`; return;
  }
  let html=''; let shown=0;
  pdata.matchdays.forEach(md=>{
    const fixtures=md.fixtures.filter(fx=>matchesScheduleFilters(fx,FILTERS.mode,FILTERS.today));
    if(!fixtures.length) return;
    shown+=fixtures.length;
    html+=`<div class="group"><div class="grouphd"><span class="gr">${esc(md.round||'Round')}</span>`+
      (md.subtotal!=null?`<span class="gsub">Subtotal <b class="num">${md.subtotal}</b></span>`:'')+`</div>`;
    fixtures.forEach(fx=>html+=fixtureHtml(fx));
    html+=`</div>`;
  });
  host.innerHTML = shown? html : `<div class="empty">No matches match these filters.</div>`;
}

function teamLine(t){
  if(!t) return `<div class="teamline"><span class="hide">TBD</span></div>`;
  if(t.hidden) return `<div class="teamline">👁️ <span class="hide">hidden until deadline</span></div>`;
  if(!t.code) return `<div class="teamline"><span class="slot num">${esc(t.name||'TBD')}</span></div>`;
  return `<div class="teamline">${flagImg(t.code,'flag sm')}<span class="tn">${esc(t.name||t.code||'TBD')}</span></div>`;
}

// One predicted-team row: flag in a fixed left column, name beside it (so the
// two rows of a knockout pick share a clean flag column and never look ragged).
function predTeamLine(t){
  const name=esc((t&&(t.name||t.code))||'?');
  return `<span class="pt" title="${name}">${flagImg(t&&t.code,'flag sm')}<span class="ptn">${name}</span></span>`;
}

function fixtureHtml(fx){
  const live=isLive(fx);
  const done=isCompleted(fx);
  const bucketDone=matchIsCompletedOrPast(fx);
  const when=fmtFixture(fx.kickoff_utc);
  const st=live
    ? '<span class="st live"><span class="livedot"></span>LIVE</span>'
    : (bucketDone?'<span class="st ft">FT</span>':'<span class="st ns">'+esc(fx.status||'NS')+'</span>');

  // Predicted column
  let predHtml='';
  if(fx.predicted && fx.predicted.type==='teams'){
    if(fx.predicted.hidden){
      // Pick is locked/blocked for now (deadline not passed, or not yet
      // scrapeable). Show "?" placeholders aligned to the same flag column as a
      // revealed pick — they fill in automatically once the prediction becomes
      // available, no code change needed. (The Status column already reads
      // "pending", so no extra label here.)
      predHtml=`<div class="predteams" title="Pick stays hidden until the deadline — it fills in automatically once it's revealed">
        <span class="pt pend"><span class="qmark">?</span></span>
        <span class="pt pend"><span class="qmark">?</span></span>
      </div>`;
    }else{
      predHtml=`<div class="predteams">${predTeamLine(fx.predicted.home)}${predTeamLine(fx.predicted.away)}</div>`;
    }
  }else{
    predHtml=`<div class="scoreline pred">${esc(fx.predicted?.score||'—')}</div>`;
  }

  // Actual score, shown beneath the prediction. Live games get the red "live"
  // treatment with the running score; finished games get a "Final" line that's
  // green on an exact call and red on a miss.
  let finalHtml='';
  const act=clean(fx.actual_score||'');
  const hasResult=act && act.toUpperCase()!=='NS' && /\d/.test(act);
  if(live){
    finalHtml=`<div class="actualrow"><div class="lab live"><span class="livedot"></span>Live</div>`+
      `<div class="scoreline fin live">${esc(hasResult?act:'0 - 0')}</div></div>`;
  }else if(hasResult){
    const hit=fx.is_exact?'hit':((fx.points??0)>0?'':'miss');
    finalHtml=`<div class="actualrow"><div class="lab">Final</div>`+
      `<div class="scoreline fin ${hit}">${esc(act)}</div></div>`;
  }

  // Points column
  let ptsHtml;
  if(live){
    ptsHtml=`<div class="pv num">${fx.points??0}</div><div class="pp live">live pts</div>`;
  }else if(done){
    ptsHtml=`<div class="pv num">${fx.points??0}</div>`+(fx.is_exact?`<div class="perfect">🎯 Perfect</div>`:'');
  }else{
    ptsHtml=`<div class="pp">pending</div>`;
  }

  // "Read as if it is live" caption under the prediction while a match is in play.
  let liveCap='';
  if(live){
    const home=esc(teamName(fx.match?.home)), away=esc(teamName(fx.match?.away));
    // Before the feed posts a numeric score the raw value is a status code ("NS")
    // — show "vs" rather than leaking the badge text into the matchup line.
    const lvScore=hasResult?esc(act):'vs';
    liveCap=`<div class="livecap">
      <span class="livedot"></span>LIVE NOW
      <span class="lvscore">${home} ${lvScore} ${away}</span>
      <span class="lvpts">— you're on ${fx.points??0} pts so far${fx.is_exact?' · on for a 🎯':''}</span>
    </div>`;
  }

  return `<div class="fx fxlink ${live?'live':''} ${fx.is_exact&&done?'exact':''}" data-match-key="${esc(matchKey(fx))}" role="button" tabindex="0" title="See every player's prediction for this match">
    <div class="when">${st}<div>${esc(when.date)}</div><div>${esc(when.time)}</div></div>
    <div class="match">
      ${teamLine(fx.match?.home)}
      ${teamLine(fx.match?.away)}
    </div>
    <div class="pcol"><div class="lab">Predicted</div>${predHtml}${finalHtml}</div>
    <div class="ptsbox"><div class="lab">${live?'Live':(done?'Points':'Status')}</div>${ptsHtml}</div>
    ${liveCap}
  </div>`;
}

function renderBonus(pdata){

    return `<div class="fx">

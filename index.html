<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bobby & Friends — Fantasy World Cup 2026</title>
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="theme-color" content="#4f46e5" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
<script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#eaeef6; --card:#ffffff; --ink:#0e1726; --muted:#6b7891; --line:#e6eaf2;
    --accent:#4f46e5; --accent2:#7c3aed; --pitch:#15803d;
    --up:#16a34a; --up-bg:#e7f7ee; --down:#e23b3b; --down-bg:#fdecec; --same:#9aa6bd;
    --gold:#f4c430; --silver:#b9c2d0; --bronze:#cd8132;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.08);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{scrollbar-color:#2563eb #dbe5f4;scrollbar-width:thin}
  *::-webkit-scrollbar{width:11px;height:11px}
  *::-webkit-scrollbar-track{background:linear-gradient(180deg,#dbe5f4,#eef3fb)}
  *::-webkit-scrollbar-thumb{
    background:linear-gradient(180deg,#38bdf8 0%,#2563eb 48%,var(--accent) 100%);
    border:3px solid #dbe5f4;border-radius:999px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.45)
  }
  *::-webkit-scrollbar-thumb:hover{
    background:linear-gradient(180deg,#7dd3fc 0%,#1d4ed8 45%,var(--accent2) 100%)
  }
  *::-webkit-scrollbar-corner{background:#dbe5f4}
  body{
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;
    line-height:1.45;
  }
  .num{font-family:'Barlow Condensed','Inter',sans-serif;font-variant-numeric:tabular-nums;letter-spacing:.3px}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 16px 64px}

  /* ---------- Hero ---------- */
  .hero{
    background:radial-gradient(120% 140% at 0% 0%,#5b21b6 0%,#4f46e5 42%,#1e3a8a 100%);
    color:#fff;padding:28px 0 64px;position:relative;overflow:hidden;text-align:center;
  }
  .hero:after{content:"";position:absolute;inset:0;
    background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"><circle cx="20" cy="20" r="1.2" fill="white" opacity="0.07"/></svg>');}
  .hero .wrap{position:relative;z-index:1;padding-bottom:0}
  .brand{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
  .brand .ball{font-size:32px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.25))}
  .brand h1{font-size:clamp(24px,4.8vw,36px);margin:0;font-weight:800;letter-spacing:-.5px;line-height:1}
  .updated{margin-top:10px;font-size:12.5px;opacity:.85;display:flex;align-items:center;justify-content:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:#34d399;box-shadow:0 0 0 4px rgba(52,211,153,.25);display:inline-block}
  .refresh{margin-left:8px;display:inline-flex;align-items:center;gap:5px;cursor:pointer;
    font:inherit;font-size:12px;font-weight:700;color:#fff;
    background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);
    border-radius:999px;padding:3px 11px 3px 9px;line-height:1;
    transition:background .15s,border-color .15s,opacity .15s}
  .refresh:hover{background:rgba(255,255,255,.24);border-color:rgba(255,255,255,.45)}
  .refresh:active{transform:translateY(1px)}
  .refresh:disabled{cursor:default;opacity:.7}
  .refresh .ri{display:inline-block;font-size:14px;line-height:1}
  .refresh.spin .ri{animation:rspin .7s linear infinite}
  @keyframes rspin{to{transform:rotate(360deg)}}
  .refresh.ok{background:rgba(52,211,153,.32);border-color:rgba(52,211,153,.6)}

  /* ---------- Movers strip ---------- */
  .movers{display:flex;gap:12px;margin-top:18px;flex-wrap:wrap;justify-content:center}
  .mover{
    background:rgba(255,255,255,.12);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.18);
    border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:10px;min-width:0;
  }
  .mover .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;opacity:.8}
  .mover .nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
  .mover .chg{font-weight:800;font-size:15px}
  .mover.up .chg{color:#6ee7a8}.mover.down .chg{color:#fca5a5}

  /* ---------- Live ticker (hero) ---------- */
  .livestrip{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;justify-content:center}
  .liveitem{background:rgba(226,59,59,.18);border:1px solid rgba(255,255,255,.22);border-radius:12px;
    padding:8px 13px;display:flex;flex-direction:column;gap:3px;min-width:0}
  .liveitem .lv{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:#ffdada;display:flex;align-items:center;gap:5px;font-weight:800}
  .liveitem .mt{font-weight:700;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:8px}
  .liveitem .sc{font-family:'Barlow Condensed';font-weight:800;font-size:16px}

  /* ---------- Board ---------- */
  .board{margin-top:-40px;position:relative;z-index:2}
  .board-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 4px 10px;color:#fff;flex-wrap:wrap}
  .board-head h2{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:0;opacity:.95}
  .bh-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  /* Prominent schedule entry, sitting on the hero gradient beside "Standings". */
  .schedbtn{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font:inherit;
    font-size:12.5px;font-weight:800;color:#fff;letter-spacing:.2px;
    background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.32);
    border-radius:999px;padding:6px 14px;line-height:1;
    transition:background .15s,border-color .15s,transform .12s}
  .schedbtn:hover{background:rgba(255,255,255,.28);border-color:rgba(255,255,255,.5);transform:translateY(-1px)}
  .schedbtn:active{transform:translateY(0)}
  .schedbtn .ic{font-size:14px}
  .schedbtn:focus-visible{outline:2px solid #fff;outline-offset:2px}
  .legend{display:flex;gap:12px;font-size:11.5px;color:#e7e9f5;opacity:.9;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .pill{width:9px;height:9px;border-radius:3px;display:inline-block}

  .cards{display:flex;flex-direction:column;gap:8px}
  .row{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    display:grid;grid-template-columns:54px 1fr auto auto;align-items:center;gap:14px;
    padding:14px 16px;cursor:pointer;border:1px solid transparent;
    transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease;
    animation:fadeUp .4s ease both;
  }
  .row:hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(16,24,40,.10),0 18px 40px rgba(16,24,40,.10)}
  .row.up{border-color:#bbe9cd;background:linear-gradient(90deg,var(--up-bg),#fff 26%)}
  .row.up{animation:fadeUp .4s ease both, climb 1.6s ease 1}
  @keyframes climb{0%{box-shadow:0 0 0 0 rgba(22,163,74,.0)}30%{box-shadow:0 0 0 4px rgba(22,163,74,.22)}100%{box-shadow:var(--shadow)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .rankcell{display:flex;align-items:center;justify-content:center}
  .rankbadge{
    width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-family:'Barlow Condensed';font-weight:800;font-size:22px;background:#f1f3f9;color:#3a4663;
  }
  .r1 .rankbadge{background:linear-gradient(135deg,#ffe27a,#f4b400);color:#5a4300;box-shadow:0 6px 16px rgba(244,180,0,.35)}
  .r2 .rankbadge{background:linear-gradient(135deg,#eef1f6,#c2cad8);color:#3a4150;box-shadow:0 6px 16px rgba(160,170,190,.3)}
  .r3 .rankbadge{background:linear-gradient(135deg,#f0c08a,#cd8132);color:#5b3410;box-shadow:0 6px 16px rgba(205,129,50,.3)}

  .who{display:flex;align-items:center;gap:12px;min-width:0}
  .flag{width:30px;height:22px;border-radius:4px;object-fit:cover;box-shadow:0 1px 3px rgba(0,0,0,.18);background:#dfe4ee;flex:none}
  .flag.sm{width:22px;height:16px;border-radius:3px}
  .name{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crown{font-size:13px;margin-left:2px}
  .sub-mini{font-size:11.5px;color:var(--muted);font-weight:500;margin-top:1px;display:flex;align-items:center;gap:8px}

  .move{display:flex;align-items:center;justify-content:flex-end;gap:5px;font-weight:800;font-size:14px;min-width:54px}
  .move.up{color:var(--up)}.move.down{color:var(--down)}.move.same{color:var(--same)}
  .move .arr{font-size:12px}
  .badge-new{background:#eef2ff;color:#4f46e5;font-size:10px;font-weight:800;padding:3px 7px;border-radius:999px;letter-spacing:.4px}

  .ptscell{text-align:right;min-width:78px}
  .pts{font-family:'Barlow Condensed';font-weight:800;font-size:26px;line-height:1}
  .pts small{font-size:11px;color:var(--muted);font-family:'Inter';font-weight:600;display:block;text-transform:uppercase;letter-spacing:.6px}
  .exact{display:inline-flex;align-items:center;gap:3px;font-size:12px;color:var(--muted);font-weight:600}

  @media(max-width:620px){
    /* Tighter hero so the standings come into view sooner. The two movers
       sit side-by-side and the Leader chip spans the full width below them
       (instead of floating centered), and live matches stack full-width. */
    .hero{padding:22px 0 88px}
    .movers{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
    .mover{padding:9px 11px;border-radius:12px;justify-content:space-between}
    .mover:last-child{grid-column:1 / -1}
    .mover .nm{max-width:none}
    .livestrip{flex-direction:column;gap:8px;margin-top:12px}
    .liveitem{width:100%}
    .liveitem .mt{justify-content:center}

    .board{margin-top:-74px}
    .board-head{align-items:flex-start;gap:8px;margin-bottom:12px;color:#fff}
    .bh-left{width:100%;justify-content:space-between;gap:8px}
    .legend{width:100%;justify-content:center;gap:8px 12px;color:#fff;opacity:1}
    .legend span{white-space:nowrap}

    .row{grid-template-columns:46px 1fr auto;gap:10px;padding:12px}
    .move{grid-column:2;grid-row:2;justify-content:flex-start;min-width:0;margin-top:-4px}
    .who{grid-row:1;grid-column:2}
    .rankcell{grid-row:1;grid-column:1}
    .ptscell{grid-row:1 / span 2;grid-column:3}
    .name{font-size:15px}
    .rankbadge{width:38px;height:38px;font-size:19px}
  }

  /* ---------- Recent results ---------- */
  .results{margin-top:28px}
  .results-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 4px 12px}
  .results-head h2{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:0}
  .seeall{font:inherit;font-size:12.5px;font-weight:700;color:var(--accent);background:none;border:none;
    cursor:pointer;padding:5px 9px;border-radius:8px;transition:background .12s}
  .seeall:hover{background:#eef2ff}
  .resgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  @media(max-width:680px){.resgrid{grid-template-columns:1fr}}
  .rescard{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;
    display:flex;flex-direction:column;gap:7px;animation:fadeUp .4s ease both}
  .rescard.live{border:1.5px solid #f6b8b8;background:linear-gradient(90deg,#fff5f5,#fff 30%)}
  .rescard .rc-top{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
    font-weight:700;display:flex;justify-content:space-between;gap:8px}
  .rescard .rc-team{display:flex;align-items:center;gap:10px;justify-content:space-between}
  .rescard .tinfo{display:flex;align-items:center;gap:8px;min-width:0}
  .rescard .tn{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rescard .gs{font-family:'Barlow Condensed';font-weight:800;font-size:20px;color:var(--muted)}
  .rescard .rc-team.win .tn{font-weight:800}
  .rescard .rc-team.win .gs{color:var(--ink)}
  .rescard.live .gs{color:#e23b3b}

  /* Full Schedule modal rows */
  .resrow{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:10px 14px;margin-bottom:8px;
    display:grid;grid-template-columns:128px 1fr auto;gap:12px;align-items:center}
  .resrow.live{border:1.5px solid #f6b8b8;background:linear-gradient(90deg,#fff5f5,#fff 30%)}
  .rr-when{font-size:12px;color:var(--muted);font-weight:600;line-height:1.35}
  .rr-when .st{margin-bottom:5px}
  .rr-date{font-weight:700;color:var(--ink)}
  .rr-time{font-variant-numeric:tabular-nums}
  .rr-teams{display:flex;flex-direction:column;gap:6px;min-width:0}
  .rr-team{display:flex;align-items:center;gap:8px;min-width:0}
  .rr-team .tn{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rr-team.win .tn{font-weight:800}
  .rr-result{text-align:right;min-width:56px}
  .rr-score{font-family:'Barlow Condensed';font-weight:800;font-size:22px}
  .rr-score.live{color:#e23b3b}
  .rr-vs{font-family:'Barlow Condensed';font-weight:800;font-size:16px;color:var(--same)}
  @media(max-width:640px){.resrow{grid-template-columns:104px 1fr auto}}

  /* Full Schedule toolbar: segmented filter + timezone picker, sitting just
     below the modal header. */
  .sched-tools{display:flex;align-items:center;justify-content:space-between;
    gap:10px;flex-wrap:wrap;padding:14px 18px 4px;flex:none;background:var(--bg)}

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(10,15,30,.55);backdrop-filter:blur(3px);
    display:none;align-items:flex-start;justify-content:center;z-index:50;padding:28px 16px;overflow:hidden}
  .overlay.open{display:flex}
  /* The modal is a fixed-height flex column: the header (and any toolbar) stay
     pinned while only .mbody scrolls — so Close / Back and the match/player
     title are always in reach. */
  .modal{background:var(--bg);width:100%;max-width:920px;border-radius:22px;overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.4);animation:pop .25s ease both;
    position:relative;z-index:1;
    display:flex;flex-direction:column;max-height:calc(100dvh - 56px);
    touch-action:pan-y;overscroll-behavior-x:none}
  /* Collapse-to-color dismiss, contained within the popup: as you drag down, the
     header's purple sweeps downward as a curtain over the body (driven from JS
     via the --bleed-* custom properties, which survive innerHTML re-renders).
     The header title/close sit above it (higher z-index) and stay readable. */
  .modal::before{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(120deg,#4f46e5,#7c3aed);will-change:opacity,clip-path;
    opacity:var(--bleed-o,0);clip-path:inset(0 0 calc(100% * (1 - var(--bleed-p,0))) 0);
    transition:opacity .28s ease,clip-path .28s ease}
  .modal.dragging::before{transition:none}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  .mhead{background:linear-gradient(120deg,#4f46e5,#7c3aed);color:#fff;padding:20px 22px;display:flex;align-items:center;gap:16px;position:relative;flex:none;z-index:2}
  /* Grab-handle affordance for swipe-to-close — shown on touch devices. */
  .mhead::before{content:"";position:absolute;top:7px;left:50%;transform:translateX(-50%);
    width:40px;height:4px;border-radius:999px;background:rgba(255,255,255,.45);opacity:0}
  @media(hover:none){.mhead::before{opacity:1}}
  .mhead .flag{width:46px;height:34px}
  .mhead h3{margin:0;font-size:24px;font-weight:800}
  .mhead .meta{font-size:13px;opacity:.85;margin-top:2px}
  .close{position:absolute;top:16px;right:16px;width:34px;height:34px;border-radius:50%;border:none;
    background:rgba(255,255,255,.18);color:#fff;font-size:18px;cursor:pointer;line-height:1}
  .close:hover{background:rgba(255,255,255,.3)}
  .mbody{padding:18px 18px 26px;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;
    flex:1 1 auto;min-height:0;overscroll-behavior-y:contain;overscroll-behavior-x:none;
    touch-action:pan-y}
  .mbody>*{max-width:100%}

  .stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
  .stat{background:var(--card);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow)}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700}
  .stat .v{font-family:'Barlow Condensed';font-weight:800;font-size:28px;line-height:1.1;margin-top:2px}
  .stat .t{font-size:11.5px;font-weight:700;margin-top:2px}
  .t.up{color:var(--up)}.t.down{color:var(--down)}.t.same{color:var(--muted)}

  .charts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:16px;max-width:100%}
  .chartcard{background:var(--card);border-radius:14px;padding:12px 14px 8px;box-shadow:var(--shadow);min-width:0;max-width:100%}
  .chartcard h4{margin:0 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .chartcard .cwrap{height:170px;position:relative;min-width:0;max-width:100%;overflow:hidden}
  .chartcard canvas{display:block;width:100%!important;max-width:100%;height:100%!important}
  @media(max-width:680px){.charts{grid-template-columns:minmax(0,1fr)}.stats{grid-template-columns:repeat(3,minmax(0,1fr))}}

  /* Collapsible "Performance tracking" section — collapsed by default so the
     prediction sheet is the first thing in view. */
  .track{margin-bottom:16px;background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .track>summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:10px;
    padding:13px 16px;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
  .track>summary::-webkit-details-marker{display:none}
  .track>summary:hover{background:#f7f9fd}
  .track>summary .hint{margin-left:auto;font-weight:700;font-size:11.5px;text-transform:none;letter-spacing:0;
    color:var(--muted);display:inline-flex;align-items:center;gap:8px}
  .track>summary .chev{font-size:17px;line-height:1;color:var(--muted);transition:transform .25s}
  .track[open]>summary .chev{transform:rotate(180deg)}
  .track .track-body{padding:0 14px 12px;min-width:0;max-width:100%}
  .track .charts{margin-bottom:0}
  @media(max-width:560px){
    .mbody{padding:14px 14px 22px}
    .track .track-body{padding:0 10px 10px}
    .chartcard{padding:10px 10px 8px}
    .track>summary .hint .htxt{display:none}
  }

  /* ---------- Filters + sheet ---------- */
  .sheet-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:6px 2px 12px;flex-wrap:wrap}
  .sheet-head h4{margin:0;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.6px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;min-width:0;max-width:100%}
  /* iOS-style segmented control: a pill container with a filled thumb that
     slides + resizes between the three options (positioned in JS so the thumb
     hugs each label's real width). */
  .segmented{position:relative;display:inline-flex;max-width:100%;background:#eef1f7;border:1px solid #d4dbea;
    border-radius:999px;padding:3px;isolation:isolate}
  .segmented .seg{position:relative;z-index:1;border:0;background:transparent;cursor:pointer;font:inherit;
    font-weight:700;font-size:12.5px;color:var(--muted);padding:7px 14px;border-radius:999px;white-space:nowrap;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;line-height:1;transition:color .2s;
    min-width:0;overflow:hidden;text-overflow:ellipsis}
  .segmented .seg:hover:not(.active){color:var(--ink)}
  .segmented .seg.active{color:#fff}
  .segmented .seg .cnt{font-variant-numeric:tabular-nums;font-weight:800;font-size:11px;opacity:.6}
  .segmented .seg.active .cnt{opacity:.85}
  .segmented .seg:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .segmented .seg-thumb{position:absolute;top:3px;bottom:3px;left:0;z-index:0;border-radius:999px;

  /* Standalone toggle (Today) sits beside the segmented control. */

  .group{margin-bottom:18px}

  .fx{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:8px;

  .fx.exact{border:1.5px solid #f4c430;background:linear-gradient(90deg,#fffae8,#fff 30%)}

  .fx .when .st{display:inline-block;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;margin-bottom:4px;letter-spacing:.4px}
  .st.ft{background:#e7f7ee;color:#16794a}.st.ns{background:#eef1f7;color:#67738c}
  .st.live{background:#fdecec;color:#c01d1d;display:inline-flex;align-items:center;gap:5px}
  /* Smooth "radar" pulse: a steady dot with a ring that expands & fades out.
     The ring ends fully transparent, so the loop restart is seamless. */
  .livedot{width:8px;height:8px;border-radius:50%;background:#e23b3b;display:inline-block;
    position:relative;flex:none;animation:liveglow 1.8s ease-in-out infinite}
  .livedot::after{content:"";position:absolute;left:50%;top:50%;width:100%;height:100%;border-radius:50%;
    background:#e23b3b;transform:translate(-50%,-50%) scale(1);opacity:.5;
    animation:livepulse 1.8s cubic-bezier(.4,0,.2,1) infinite}
  @keyframes livepulse{
    0%{transform:translate(-50%,-50%) scale(1);opacity:.5}
    100%{transform:translate(-50%,-50%) scale(3.2);opacity:0}}
  @keyframes liveglow{0%,100%{opacity:1}50%{opacity:.78}}
  @media(prefers-reduced-motion:reduce){
    .livedot,.livedot::after{animation:none}.livedot::after{opacity:0}}
  .scoreline.live{color:#e23b3b}

  .fx.live{border:1.5px solid #f6b8b8;background:linear-gradient(90deg,#fff5f5,#fff 30%)}

  .match{display:flex;flex-direction:column;gap:5px;min-width:0}

  .teamline .slot{display:inline-block;background:#eef1f7;color:#56627d;font-weight:700;font-size:13px;padding:2px 9px;border-radius:7px}
  .pcol{text-align:center;min-width:0}
  .pcol .lab,.ptsbox .lab{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:2px}
  .scoreline{font-family:'Barlow Condensed';font-weight:800;font-size:20px;line-height:1}
  .scoreline.pred{color:#4f46e5}

  /* Actual / final result shown beneath the prediction for completed games */
  .actualrow{margin-top:7px;padding-top:6px;border-top:1px dashed var(--line)}

  .scoreline.fin{font-size:18px;color:var(--ink)}
  .scoreline.fin.hit{color:var(--up)}
  .scoreline.fin.miss{color:var(--down)}
  .scoreline.fin.live{color:#e23b3b}
  .actualrow .lab.live{color:#c01d1d;display:inline-flex;align-items:center;gap:4px}
  /* Predicted teams (knockout): flags share a fixed left column so the two rows
     line up; the block itself is centered within the column via .pcol. */
  .predteams{display:inline-flex;flex-direction:column;gap:6px;align-items:flex-start;text-align:left;font-size:13px;font-weight:600;max-width:100%}
  .predteams .pt{display:flex;align-items:center;gap:7px;min-width:0;max-width:100%;cursor:default}

  .ptsbox{text-align:right;min-width:0}
  .ptsbox .pv{font-family:'Barlow Condensed';font-weight:800;font-size:22px}

  .perfect{display:inline-block;background:#f4c430;color:#5a4300;font-size:9.5px;font-weight:800;padding:3px 7px;

  .bonus .fx{grid-template-columns:120px 1fr 1fr 70px}
  .bonus .q{font-weight:800;font-size:14px}
  .bonus .val{font-size:13px;font-weight:600}

  @media(max-width:640px){

    .fx{grid-template-columns:minmax(0,1fr) auto;gap:9px 12px;padding:13px 14px}
    .fx .when{grid-column:1;grid-row:1;display:flex;align-items:center;flex-wrap:wrap;gap:4px 8px}

  .empty{background:var(--card);border-radius:14px;padding:26px;text-align:center;color:var(--muted);box-shadow:var(--shadow)}

  .loading{padding:80px 0;text-align:center;color:var(--muted)}

  /* ---------- Clickable affordances ----------

  .resrow[data-match-key]{transition:transform .14s ease,box-shadow .14s ease}
  .resrow[data-match-key]:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(16,24,40,.10),0 12px 28px rgba(16,24,40,.10)}
  .fx.fxlink{transition:transform .14s ease,box-shadow .14s ease}
  .fx.fxlink:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(16,24,40,.10),0 12px 28px rgba(16,24,40,.10)}
  /* Persistent, unobtrusive cue that prediction rows open the all-picks popup. */
  .sheet-hint{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:2px}

  /* ---------- Modal: Back control ---------- */
  .mback{position:absolute;top:16px;left:18px;display:inline-flex;align-items:center;gap:3px;
    border:none;background:rgba(255,255,255,.18);color:#fff;font:inherit;font-size:13px;font-weight:700;
    border-radius:999px;padding:6px 13px 6px 10px;cursor:pointer;line-height:1;transition:background .15s}
  .mback:hover{background:rgba(255,255,255,.32)}
  .mhead.hasback{padding-top:48px}

  /* "Swipe down to close" cue — fades in as you start dragging the popup down.

     highlight, and a gently bouncing chevron. */
  .swipe-hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);
    background:linear-gradient(120deg,#4f46e5,#7c3aed);color:#fff;
    font-size:12.5px;font-weight:700;letter-spacing:.3px;
    padding:8px 15px 8px 13px;border-radius:999px;pointer-events:none;opacity:0;
    transition:opacity .2s ease;z-index:60;display:inline-flex;align-items:center;gap:7px;

    box-shadow:0 10px 26px rgba(79,70,229,.45),inset 0 1px 0 rgba(255,255,255,.25)}
  .swipe-hint .ar{font-size:15px;line-height:1;animation:swipeBob 1.3s ease-in-out infinite}

  /* ---------- Match-predictions popup ---------- */

  .mp-board .mp-score.live{color:#e23b3b}
  .mp-board .mp-vs{font-family:'Barlow Condensed';font-weight:800;font-size:30px;color:var(--muted)}
  .mp-board .mp-kick{font-size:12px;color:var(--muted);font-weight:700}

  /* Kickoff time + location strip under the scoreboard. */
  .mp-meta{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:12px 0 2px}

  .mp-meta .mi .ic{font-size:13px}
  .mp-meta .mi .sub{color:var(--muted);font-weight:600}

  /* Consensus summary chips + distribution. */
  .mp-sum{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0 4px}
  .mp-chip{background:var(--card);border-radius:999px;box-shadow:var(--shadow);padding:8px 13px;
    font-size:12.5px;font-weight:700;color:var(--ink);display:inline-flex;align-items:center;gap:7px}
  .mp-chip .ic{font-size:14px}

  .mp-chip.hit{background:linear-gradient(90deg,#fffae8,#fff);box-shadow:0 0 0 1.5px #f4c430 inset,var(--shadow)}

  .mp-dist{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:13px 15px;margin:12px 0 4px}
  .mp-dist h4{margin:0 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .mp-bar{display:grid;grid-template-columns:88px 1fr 34px;align-items:center;gap:10px;margin-bottom:8px}
  .mp-bar:last-child{margin-bottom:0}
  .mp-bar .lab{font-family:'Barlow Condensed';font-weight:800;font-size:16px;text-align:right;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .mp-bar .track{height:10px;background:#eef1f7;border-radius:999px;overflow:hidden}
  .mp-bar .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width .5s cubic-bezier(.34,1.1,.64,1)}

  /* Sort control row. */
  .mp-tools{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:18px 2px 12px;flex-wrap:wrap}
  .mp-tools h4{margin:0;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.6px}

  /* Per-player pick rows. */
  .mp-row{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:11px 14px;margin-bottom:8px;

  .mp-res .pv.live{color:#e23b3b}
  .mp-res .tag{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:var(--muted)}

  @media(max-width:640px){
    .mp-board .mp-side .flag{width:44px;height:33px}

    .mp-row{grid-template-columns:26px 1fr auto;gap:8px 10px;padding:11px 13px}

    .mp-who{grid-column:2;grid-row:1}

</style>

<body>
  <header class="hero">
    <div class="wrap">
      <div class="brand">
        <span class="ball">⚽</span>
        <h1 id="poolName">Fantasy World Cup 2026</h1>

        <button id="refresh" class="refresh" type="button" title="Re-check for the latest scraped data" aria-label="Refresh data">
          <span class="ri">↻</span><span class="rt">Refresh</span>
        </button>
      </div>
      <div class="livestrip" id="livestrip"></div>
      <div class="movers" id="movers"></div>
    </div>
  </header>

  <main class="wrap">
    <section class="board">
      <div class="board-head">
        <div class="bh-left">
          <h2>Standings</h2>
          <button id="openSchedTop" class="schedbtn" type="button" title="See every match — played and upcoming">
            <span class="ic">📅</span>Full Schedule
          </button>
        </div>
        <div class="legend">
          <span><i class="pill" style="background:var(--gold)"></i>Top 3</span>
          <span><i class="pill" style="background:var(--up)"></i>Climbed</span>
          <span>🎯 Exact scores</span>
        </div>
      </div>
      <div class="cards" id="board"><div class="loading">Loading standings…</div></div>
    </section>

    <section class="results">
      <div class="results-head">

        <button id="allResults" class="seeall" type="button">View full schedule →</button>
      </div>

    </section>

    <div class="tzbar">
      <label class="tzpick" for="tzSelectFoot">
        <span class="ic">🕒</span>

      </label>

  <div class="overlay" id="overlay">
    <div class="swipe-hint" id="swipeHint" aria-hidden="true"><span class="ar">⌄</span>Swipe down to close</div>
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

<script>
const DATA_DIR = "data";
const FLAG = code => `https://assets.tournamentsoccer.us/flags/4x3/${(code||'').toUpperCase()}.svg`;
const FALLBACK_FLAG = "data:image/svg+xml;utf8," + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="22"><rect width="30" height="22" rx="3" fill="#dfe4ee"/></svg>');

let RANKINGS=null, HISTORY=[], PRED={}, MOVE={};
let charts=[];

const $ = (s,el=document)=>el.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function flagImg(code, cls='flag'){
  if(!code) return `<img class="${cls}" src="${FALLBACK_FLAG}" alt="">`;
  return `<img class="${cls}" src="${FLAG(code)}" alt="${esc(code)}" onerror="this.onerror=null;this.src='${FALLBACK_FLAG}'">`;
}
/* ---------------- Timezone ----------------
   Every clock on the site renders in ONE chosen zone so they never disagree.
   The preference is either the literal string "auto" (follow whatever the
   browser detects) or an explicit IANA zone the viewer picked; it's persisted
   in localStorage and resolved to `TZ` (the effective zone) on every change. */
const DETECTED_TZ = (()=>{ try{ return Intl.DateTimeFormat().resolvedOptions().timeZone||'UTC'; }catch(e){ return 'UTC'; } })();
let TZ_PREF = (()=>{ try{ return localStorage.getItem('wc_tz')||'auto'; }catch(e){ return 'auto'; } })();
let TZ = TZ_PREF==='auto'?DETECTED_TZ:TZ_PREF;
/* Curated picker list: the two real venue zones for WC2026 plus a spread of
   common world zones, deduped against the detected zone. */
const TZ_ZONES=['Pacific/Honolulu','America/Anchorage','America/Los_Angeles','America/Denver',
  'America/Chicago','America/New_York','America/Sao_Paulo','UTC','Europe/London','Europe/Amsterdam',
  'Europe/Athens','Africa/Johannesburg','Asia/Dubai','Asia/Kolkata','Asia/Singapore','Asia/Tokyo','Australia/Sydney'];
function nowAbbr(tz){
  try{ return new Intl.DateTimeFormat('en-US',{timeZone:tz,timeZoneName:'short'})
    .formatToParts(new Date()).find(p=>p.type==='timeZoneName')?.value||tz; }catch(e){ return tz; }
}
function tzLabel(tz){ const c=tzCity(tz); const a=nowAbbr(tz); return c===a?c:`${c} · ${a}`; }
/* Build the <option> list for a TZ <select>, with the auto-detected zone pinned on top. */
function tzOptionsHTML(){
  const zones=[DETECTED_TZ,...TZ_ZONES.filter(z=>z!==DETECTED_TZ)];
  const auto=`<option value="auto"${TZ_PREF==='auto'?' selected':''}>${esc(tzLabel(DETECTED_TZ))} (auto-detected)</option>`;
  const rest=zones.map(z=>`<option value="${esc(z)}"${TZ_PREF===z?' selected':''}>${esc(tzLabel(z))}</option>`).join('');
  return auto+rest;
}
/* Apply a new preference everywhere: persist, re-resolve, repaint every clock. */
function setTZ(pref){
  TZ_PREF=pref; TZ=pref==='auto'?DETECTED_TZ:pref;
  try{ localStorage.setItem('wc_tz',pref); }catch(e){}
  document.querySelectorAll('.tzpick select').forEach(s=>{ if(s.value!==pref) s.value=pref; });
  if(RANKINGS) $('#updated').textContent='Updated '+fmtUpdated(RANKINGS.updated);
  renderLiveStrip(); renderRecent(); updateFoot();
  refreshTopView();
}
function fmtUpdated(iso){
  const d=new Date(iso);
  return d.toLocaleString(undefined,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit',timeZone:TZ});
}
function fmtFixture(iso){
  if(!iso) return {date:'TBD',time:''};
  const d=new Date(iso);
  return {
    date:d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric',timeZone:TZ}),
    time:d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit',timeZone:TZ})
  };
}
// Host city from an IANA timezone, e.g. "America/New_York" -> "New York".
function tzCity(tz){
  if(!tz) return '';
  const part=tz.split('/').pop()||'';
  return part.replace(/_/g,' ').trim();
}
// Short timezone label for the kickoff instant in that zone, e.g. "EDT".
function tzAbbr(iso,tz){
  if(!iso||!tz) return '';
  try{
    const parts=new Intl.DateTimeFormat('en-US',{timeZone:tz,timeZoneName:'short'}).formatToParts(new Date(iso));
    return parts.find(p=>p.type==='timeZoneName')?.value||'';
  }catch(e){ return ''; }
}
function shortStamp(iso){
  const d=new Date(iso);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric',timeZone:TZ})+' '+d.toLocaleTimeString(undefined,{hour:'numeric',timeZone:TZ});
}
/* Calendar-day key in the chosen zone (en-CA gives YYYY-MM-DD), so "Today"
   buckets matches by the viewer's selected timezone, not the browser's. */
const dayKey=(iso)=>new Date(iso).toLocaleDateString('en-CA',{timeZone:TZ});
const isSameLocalDay=(iso)=>{ if(!iso) return false; return dayKey(iso)===dayKey(Date.now()); };

// Fetch the three JSON files (cache-busted) and re-render everything in place.
// Shared by the initial load and the Refresh button, so a manual refresh pulls
// the latest committed scrape without a full page reload.
async function loadData(){
  // Cache-bust so a reload always picks up the latest scrape rather than a
  // stale copy the browser/CDN cached from an earlier (possibly empty) run.
  const bust=`?t=${Date.now()}`;
  const opts={cache:'no-store'};
  const [r,h,p] = await Promise.all([
    fetch(`${DATA_DIR}/rankings.json${bust}`,opts).then(x=>x.json()),
    fetch(`${DATA_DIR}/history.json${bust}`,opts).then(x=>x.json()).catch(()=>[]),
    fetch(`${DATA_DIR}/predictions.json${bust}`,opts).then(x=>x.json()).catch(()=>({players:{}})),
  ]);
  RANKINGS=r; HISTORY=Array.isArray(h)?h:[]; PRED=p.players||{};

  $('#poolName').textContent = (RANKINGS.pool&&RANKINGS.pool.name)||'Fantasy World Cup 2026';
  document.title = `${$('#poolName').textContent} — Fantasy World Cup 2026`;
  $('#updated').textContent = 'Updated '+fmtUpdated(RANKINGS.updated);
  MOVE = computeMovement();
  renderLiveStrip();
  renderMovers();
  renderBoard();
  renderRecent();
  // If a modal is open, refresh whichever view is on top so live scores update
  // in place (without resetting scroll, filters, or the navigation stack).
  refreshTopView();
  updateFoot();
}
function updateFoot(){
  if(!RANKINGS) return;
  $('#foot').textContent = `${RANKINGS.players.length} players · ${HISTORY.length} snapshot${HISTORY.length===1?'':'s'} tracked`;
}

// Manual refresh: spin the icon, re-fetch, then flash green briefly on success.
let REFRESHING=false;
async function refresh(){
  if(REFRESHING) return;
  REFRESHING=true;
  const btn=$('#refresh'); const label=btn.querySelector('.rt');
  btn.classList.remove('ok'); btn.classList.add('spin'); btn.disabled=true;
  const prev=label.textContent; label.textContent='Checking…';
  try{
    await loadData();
    btn.classList.add('ok'); label.textContent='Up to date';
    setTimeout(()=>{ btn.classList.remove('ok'); label.textContent=prev; }, 1600);
  }catch(e){
    label.textContent='Retry';
    setTimeout(()=>{ label.textContent=prev; }, 2000);
  }finally{
    btn.classList.remove('spin'); btn.disabled=false; REFRESHING=false;
  }
}

async function init(){
  try{
    await loadData();
  }catch(e){
    $('#board').innerHTML=`<div class="empty">Couldn't load data yet. The first scrape may not have run.<br><small>${esc(e.message)}</small></div>`;
    return;
  }
  $('#refresh').addEventListener('click', refresh);
  $('#allResults').addEventListener('click', openResults);
  $('#openSchedTop').addEventListener('click', openResults);
  // Footer timezone picker (the site-wide control). The schedule modal renders
  // its own picker bound to the same setTZ(), so the two always stay in sync.
  const tzFoot=$('#tzSelectFoot');
  tzFoot.innerHTML=tzOptionsHTML();
  tzFoot.value=TZ_PREF;
  tzFoot.addEventListener('change',e=>setTZ(e.target.value));
  // Re-evaluate the clock-based live state every 20s so a match lights up as
  // soon as your computer's time passes its kickoff (and dims when it ends),
  // even between scrapes / without reloading the page.
  setInterval(()=>{
    renderLiveStrip();
    renderRecent();
    refreshTopView();
  }, 20000);
}

// Refresh whichever view is on top of the modal stack, preserving the overlay's
// scroll position. Views that rebuild their whole body (e.g. the match popup)
// would otherwise jump back to the top on every 20s tick.
function refreshTopView(){
  if(!MODAL_STACK.length) return;
  const v=topView(); if(!v||!v.refresh) return;
  const sc=modalScroller(); const y=sc?sc.scrollTop:0;
  v.refresh();
  const sc2=lockModalScrollAxis(); if(sc2){ sc2.scrollLeft=0; sc2.scrollTop=y; }
}

function prevSnapshot(){
  if(HISTORY.length>=2) return HISTORY[HISTORY.length-2];
  return null;
}
// The live board's up/down arrows compare the current (live) rankings against
// the previous raw snapshot, so they keep reacting in real time during a match.
function computeMovement(){
  const prev=prevSnapshot(); const m={};
  RANKINGS.players.forEach(p=>{
    if(!prev){ m[p.team_id]={delta:0,status:'same',isNew:false}; return; }
    const was=prev.players.find(x=>x.team_id===p.team_id);
    if(!was){ m[p.team_id]={delta:0,status:'new',isNew:true}; return; }
    const delta=was.rank-p.rank;
    m[p.team_id]={delta,status:delta>0?'up':delta<0?'down':'same',isNew:false};
  });
  return m;
}

// Top-climber / biggest-drop movers are built from each player's confirmed
// settled readings (same wobble filter as the charts), so a mid-match wobble in
// the live totals can't manufacture a fake rank swing. Per player we compare
// their two most recent confirmed steps — i.e. the rank shift from their last
// genuine scoring event — rather than two whole snapshots, so the strip stays
// meaningful even when few snapshots are wholly settled.
function computeSettledMovement(){
  const move={};
  (RANKINGS.players||[]).forEach(p=>{
    const steps=confirmedReadings(p.team_id);
    if(steps.length<2){ move[p.team_id]={delta:0,status:'same'}; return; }
    const delta=steps[steps.length-2].p.rank-steps[steps.length-1].p.rank; // +ve = climbed
    move[p.team_id]={delta,status:delta>0?'up':delta<0?'down':'same'};
  });
  return {snapshot:{players:RANKINGS.players},move};
}

function renderMovers(){
  const box=$('#movers'); box.innerHTML='';
  const {snapshot,move}=computeSettledMovement();
  const cards=[];
  if(snapshot){
    const climbers=snapshot.players.filter(p=>move[p.team_id]&&move[p.team_id].status==='up')
      .sort((a,b)=>move[b.team_id].delta-move[a.team_id].delta);
    const fallers=snapshot.players.filter(p=>move[p.team_id]&&move[p.team_id].status==='down')
      .sort((a,b)=>move[a.team_id].delta-move[b.team_id].delta);
    if(climbers.length){const c=climbers[0];cards.push(`<div class="mover up"><div><div class="lbl">🔥 Top climber</div><div class="nm">${esc(c.name)}</div></div><div class="chg">▲${move[c.team_id].delta}</div></div>`);}
    if(fallers.length){const f=fallers[0];cards.push(`<div class="mover down"><div><div class="lbl">Biggest drop</div><div class="nm">${esc(f.name)}</div></div><div class="chg">▼${Math.abs(move[f.team_id].delta)}</div></div>`);}
  }
  // Leader is a current-standing fact (matches the live board's crown), so it
  // stays sourced from the live rankings.
  const leader=RANKINGS.players.find(p=>p.rank===1);
  if(leader) cards.push(`<div class="mover"><div><div class="lbl">👑 Leader</div><div class="nm">${esc(leader.name)}</div></div><div class="chg num">${leader.points}</div></div>`);
  box.innerHTML=cards.join('');
}

/* Roughly how long a match occupies the clock from kickoff: 90' + half-time
   + stoppage ≈ 2h5m. Used to drive the live state off your computer's clock
   between scrapes. */
const LIVE_WINDOW_MS = 125*60*1000;
/* Hard ceiling from kickoff after which a match is NEVER shown as live, even if
   a stale scrape left the status badge stuck on LIVE/HT/a minute (e.g. the
   follow-up scrape got bot-blocked and never flipped it to FT). Kept tight so a
   finished game clears ~2h10m after kickoff rather than lingering for hours. */
const LIVE_HARD_CAP_MS = 130*60*1000;

/* A fixture is "live" when EITHER the scraped status badge says so
   (LIVE / a minute / HT), OR — baked in off your system clock — the current
   time sits between kickoff and ~kickoff+2h15m and it hasn't gone Final yet.
   In BOTH cases the clock wins: once we're past kickoff + the hard cap, the
   match is treated as done so a stuck badge can't keep it "live" forever. */
function isLive(fx){
  if(!fx) return false;
  const s=(fx.status||'').toUpperCase();
  if(s.includes('FT')||isCompleted(fx)) return false;     // already final
  // Clock-based ceiling: if we know kickoff and enough time has passed, the
  // game is over regardless of what the (possibly stale) status badge says.
  if(fx.kickoff_utc){
    const ko=new Date(fx.kickoff_utc).getTime();
    if(!isNaN(ko) && Date.now()>=ko+LIVE_HARD_CAP_MS) return false;
  }
  if(s.includes('LIVE')||s.includes('HT')||/\d+'/.test(s)) return true;
  if(fx.kickoff_utc){
    const ko=new Date(fx.kickoff_utc).getTime();
    if(!isNaN(ko)){
      const now=Date.now();
      if(now>=ko && now<ko+LIVE_WINDOW_MS) return true;
    }
  }
  return false;
}
function teamName(t){ return (t&&(t.name||t.code))||'TBD'; }
/* Stable id for a fixture, shared by every render path so a click anywhere
   (live strip, results, a player's sheet) resolves to the same match. Every
   scraped fixture carries a unique fixture_number; the composite is just a
   defensive fallback. */
function matchKey(fx){
  if(!fx) return '';
  return String(fx.fixture_number ?? (teamName(fx.match?.home)+'_'+teamName(fx.match?.away)+'_'+(fx.kickoff_utc||'')));
}

/* Collect the set of matches that are in progress right now, deduped by
   fixture number across every player's prediction page. */
function liveMatches(){
  const seen=new Map();
  Object.values(PRED).forEach(p=>{
    (p.matchdays||[]).forEach(md=>(md.fixtures||[]).forEach(fx=>{
      if(!isLive(fx)) return;
      const key=matchKey(fx);
      if(!seen.has(key)){
        // Until the feed posts a numeric score the raw value is a status code
        // ("NS"); show "vs" rather than leaking the badge into the matchup line.
        const sc=clean(fx.actual_score||'');
        seen.set(key,{
          key,
          home:teamName(fx.match?.home), homeCode:fx.match?.home?.code,
          away:teamName(fx.match?.away), awayCode:fx.match?.away?.code,
          score:/\d/.test(sc)?sc:'vs', status:clean(fx.status)||'LIVE',
        });
      }
    }));
  });
  return [...seen.values()];
}
function clean(s){ return (s==null?'':String(s)).replace(/^[\s·•\-–]+|[\s·•\-–]+$/g,'').trim(); }

/* Collect every fixture across all players' prediction pages, deduped by
   fixture number, into a single global match list (used for the results
   section and the all-results modal). */
function allMatches(){
  const seen=new Map();
  Object.values(PRED).forEach(p=>{
    (p.matchdays||[]).forEach(md=>(md.fixtures||[]).forEach(fx=>{
      const key=matchKey(fx);
      if(!seen.has(key)){
        seen.set(key,{
          key,
          round:md.round||fx.round||'Matches',
          home:teamName(fx.match?.home), homeCode:fx.match?.home?.code,
          away:teamName(fx.match?.away), awayCode:fx.match?.away?.code,
          score:clean(fx.actual_score||''), status:fx.status, kickoff:fx.kickoff_utc,
          live:isLive(fx), done:isCompleted(fx),
        });
      }
    }));
  });
  return [...seen.values()];
}
function parseScore(s){
  const m=clean(s||'').match(/(\d+)\s*[-–]\s*(\d+)/);
  return m?{h:+m[1],a:+m[2]}:null;
}

/* The three most recent completed (or in-progress) matches, shown on the
   main screen. Live games float to the top so they're never missed. */
function renderRecent(){
  const box=$('#recentResults'); if(!box) return;
  const ms=allMatches().filter(m=>m.live||(m.done&&parseScore(m.score)));
  ms.sort((a,b)=>(b.live?1:0)-(a.live?1:0) || new Date(b.kickoff)-new Date(a.kickoff));
  const recent=ms.slice(0,3);
  if(!recent.length){ box.innerHTML='<div class="empty">No completed matches yet — results show up here as games finish.</div>'; return; }
  box.innerHTML=recent.map((m,i)=>resCard(m,i)).join('');
}
function resCard(m,i){
  const sc=parseScore(m.score)||{h:'–',a:'–'};
  const hw=sc.h>sc.a, aw=sc.a>sc.h;
  const dt=m.kickoff?fmtFixture(m.kickoff).date:'';
  const tag=m.live
    ? '<span style="color:#e23b3b;display:inline-flex;align-items:center;gap:4px"><span class="livedot"></span>LIVE</span>'
    : 'FT · '+esc(dt);
  return `<div class="rescard ${m.live?'live':''}" data-match-key="${esc(m.key)}" role="button" tabindex="0" title="See every player's prediction for this match" style="animation-delay:${i*0.05}s">
    <div class="rc-top"><span>${esc(m.round)}</span><span>${tag}</span></div>
    <div class="rc-team ${hw?'win':''}">
      <span class="tinfo">${flagImg(m.homeCode,'flag sm')}<span class="tn">${esc(m.home)}</span></span>
      <span class="gs">${sc.h}</span>
    </div>
    <div class="rc-team ${aw?'win':''}">
      <span class="tinfo">${flagImg(m.awayCode,'flag sm')}<span class="tn">${esc(m.away)}</span></span>
      <span class="gs">${sc.a}</span>
    </div>
  </div>`;
}

/* ---------------- Modal stack ----------------
   One overlay, many stacked views. Opening a match popup from inside the
   player sheet or the results list pushes a new view and shows a ‹ Back button
   that returns you exactly where you came from; Esc / overlay-click pop one
   level. Each view exposes a light `refresh()` used by the 20s live tick and
   manual Refresh so live scores update in place without resetting scroll or
   filters. */
let MODAL_STACK=[];
function topView(){ return MODAL_STACK[MODAL_STACK.length-1]||null; }
// .mbody is the per-view scroll container now (the header stays pinned), so
// scroll save/restore tracks it rather than the overlay.
function modalScroller(){ const m=$('#modal'); return m?m.querySelector('.mbody'):null; }
function lockModalScrollAxis(){
  const sc=modalScroller();
  if(!sc || sc.dataset.axisLocked) return sc;
  sc.dataset.axisLocked='1';
  sc.addEventListener('scroll',()=>{
    if(sc.scrollLeft) sc.scrollLeft=0;
  },{passive:true});
  return sc;
}
function openModalView(view){
  const overlay=$('#overlay');
  if(MODAL_STACK.length){ const sc=modalScroller(); MODAL_STACK[MODAL_STACK.length-1].scroll=sc?sc.scrollTop:0; }
  destroyCharts();
  MODAL_STACK.push(view);
  view.render();
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
  const sc=lockModalScrollAxis(); if(sc){ sc.scrollLeft=0; sc.scrollTop=0; }
}
function popModal(){
  if(MODAL_STACK.length<=1){ closeModal(); return; }
  destroyCharts();
  MODAL_STACK.pop();
  const v=topView();
  v.render();
  const sc=lockModalScrollAxis(); if(sc){ sc.scrollLeft=0; sc.scrollTop=v.scroll||0; }
}
/* Back (only when something sits beneath) + close, shared by every view. */
function modalControls(){
  const back=MODAL_STACK.length>1?`<button class="mback" type="button" aria-label="Go back">‹ Back</button>`:'';
  return back+`<button class="close" type="button" aria-label="Close">×</button>`;
}
function wireModalControls(modal){
  const b=modal.querySelector('.mback'); if(b) b.addEventListener('click',popModal);
  modal.querySelector('.close').addEventListener('click',closeModal);
}

/* Full Schedule: every match in a modal, grouped by round in chronological
   order, with an All / Upcoming / Completed segmented filter and the shared
   timezone picker. */
let SCHED_MODE='upcoming';   // 'all' | 'upcoming' | 'completed'
function openResults(){ SCHED_MODE='upcoming'; openModalView({type:'results',render:renderResultsView,refresh:refreshResultsView,scroll:0}); }
function schedCounts(all){
  return {total:all.length, all:all.length,
    upcoming:all.filter(m=>!m.done).length,   // upcoming bucket also holds live
    completed:all.filter(m=>m.done).length};
}
/* Just the grouped match rows for the current filter — recomputed on each live
   tick, but injected into the existing .mbody so the toolbar (and its thumb)
   and the scroll position survive. */
function schedBody(all){
  const ms=all.filter(m=>SCHED_MODE==='upcoming'?!m.done:SCHED_MODE==='completed'?m.done:true);
  const groups=[], idx={};
  ms.forEach(m=>{
    const r=m.round||'Matches';
    if(!(r in idx)){ idx[r]=groups.length; groups.push({round:r,items:[]}); }
    groups[idx[r]].items.push(m);
  });
  let body='';
  groups.forEach(g=>{
    g.items.sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
    body+=`<div class="group"><div class="grouphd"><span class="gr">${esc(g.round)}</span>`+
      `<span class="gsub">${g.items.length} match${g.items.length===1?'':'es'}</span></div>`;
    g.items.forEach(m=>body+=resRow(m));
    body+=`</div>`;
  });
  return body||'<div class="empty">No matches in this filter.</div>';
}
// Build the whole modal shell once (on open / Back). The live tick uses the
// lighter refreshResultsView() below instead, so it never rebuilds the toolbar.
function renderResultsView(){
  const all=allMatches();
  const counts=schedCounts(all);
  const hasback=MODAL_STACK.length>1;
  const seg=(mode,label)=>`<button class="seg ${SCHED_MODE===mode?'active':''}" type="button" role="tab" aria-selected="${SCHED_MODE===mode}" data-mode="${mode}">${label}<span class="cnt">${counts[mode]}</span></button>`;
  const modal=$('#modal');
  modal.innerHTML=`
    <div class="mhead${hasback?' hasback':''}">
      <div><h3>Full Schedule</h3><div class="meta">${counts.total} matches · tap any match to see everyone's pick</div></div>
      ${modalControls()}
    </div>
    <div class="sched-tools">
      <div class="segmented" id="schedSeg" role="tablist" aria-label="Filter matches">
        <span class="seg-thumb" aria-hidden="true"></span>
        ${seg('all','All')}${seg('upcoming','Upcoming')}${seg('completed','Completed')}
      </div>
      <label class="tzpick" for="tzSelectModal">
        <span class="ic">🕒</span>
        <select id="tzSelectModal" aria-label="Display timezone">${tzOptionsHTML()}</select>
      </label>
    </div>
    <div class="mbody">${schedBody(all)}</div>`;
  wireModalControls(modal);
  const segEl=modal.querySelector('#schedSeg');
  // Switching filters updates only the active state, the rows, and the thumb —
  // so the pill slides smoothly between options instead of snapping from 0.
  segEl.querySelectorAll('.seg').forEach(b=>b.addEventListener('click',()=>{
    if(SCHED_MODE===b.dataset.mode) return;
    SCHED_MODE=b.dataset.mode;
    segEl.querySelectorAll('.seg').forEach(x=>{
      const on=x.dataset.mode===SCHED_MODE;
      x.classList.toggle('active',on);
      x.setAttribute('aria-selected',on);
    });
    modal.querySelector('.mbody').innerHTML=schedBody(allMatches());
    positionThumb(segEl);
  }));
  modal.querySelector('#tzSelectModal').addEventListener('change',e=>setTZ(e.target.value));
  requestAnimationFrame(()=>positionThumb(segEl));
}
/* Live-tick / manual refresh: update the counts and rows in place, leaving the
   toolbar, the segmented thumb, and the scroll position untouched. (Rebuilding
   the whole modal here was what made the thumb snap to the left and re-slide
   every 20s — most visible on Upcoming/Completed, where the thumb is offset.) */
function refreshResultsView(){
  const modal=$('#modal');
  const segEl=modal.querySelector('#schedSeg');
  if(!segEl){ renderResultsView(); return; }   // not actually the results view
  const all=allMatches();
  const counts=schedCounts(all);
  segEl.querySelectorAll('.seg').forEach(b=>{ const c=b.querySelector('.cnt'); if(c) c.textContent=counts[b.dataset.mode]; });
  const meta=modal.querySelector('.mhead .meta');
  if(meta) meta.textContent=`${counts.total} matches · tap any match to see everyone's pick`;
  const mbody=modal.querySelector('.mbody');
  if(mbody) mbody.innerHTML=schedBody(all);
  positionThumb(segEl);   // counts can change width; re-align without snapping
}
function resRow(m){
  const sc=parseScore(m.score);
  const when=fmtFixture(m.kickoff);
  const hw=sc&&sc.h>sc.a, aw=sc&&sc.a>sc.h;

/* ---------------- Player detail ---------------- */

/* Build one player's points / rank / exact series for the charts.

   The upstream site nudges a player's live total mid-match, and that
   provisional value often settles to something different at full time — so we
   can't just plot every scrape (that's the "wobble" we want to exclude). But
   restricting to whole snapshots flagged `settled` is too blunt: during a busy
   evening almost every hourly scrape lands inside SOME fixture's window, so the
   series collapsed to just start → latest and hid every real intermediate step.

   Instead we trust a reading per-player when EITHER:
     • its snapshot is settled (no match in progress at capture), OR
     • it is confirmed by the next scrape (the value held steady to the
       following reading) — a genuine post-game total persists across scrapes,
       while a one-scrape provisional blip never matches its neighbour.
   We then collapse to step only on real changes, so each finished game shows as
   its own step (e.g. fell 2 after one game, rose 1 after the next). Finally we
   append the current live standing as a "now" point so the chart tip always
   reflects where the player stands right now. Working per-player also filters
   rank wobble caused by OTHER players' mid-match blips. */
const readingSig=p=>p?`${p.points}|${p.rank}|${p.exact}`:null;

/* One player's confirmed settled readings, oldest→newest, collapsed so each
   entry is a genuine scoring change. Shared by the charts and the movers strip
   so both filter mid-match wobble the same way. */
function confirmedReadings(teamId){
  const H=(HISTORY||[]).filter(s=>s&&Array.isArray(s.players));
  const raw=H.map(s=>{
    const p=s.players.find(x=>x.team_id===teamId);
    return {ts:s.timestamp, settled:s.settled!==false, p:p?{points:p.points,rank:p.rank,exact:p.exact}:null};
  });
  const trusted=[];
  for(let i=0;i<raw.length;i++){
    const r=raw[i]; if(!r.p) continue;
    const nxt=raw[i+1];
    if(r.settled || (nxt&&nxt.p&&readingSig(nxt.p)===readingSig(r.p))) trusted.push(r);
  }
  const steps=[]; let prev=null;
  trusted.forEach(r=>{ const g=readingSig(r.p); if(g!==prev){ steps.push(r); prev=g; } });
  return steps;
}

function playerSeries(teamId){
  const steps=confirmedReadings(teamId);
  const labels=[],pts=[],ranks=[],exact=[];
  steps.forEach(r=>{ labels.push(shortStamp(r.ts)); pts.push(r.p.points); ranks.push(r.p.rank); exact.push(r.p.exact); });

  // Append the live "now" standing when it diverges from the last settled step.
  let live=false;
  const cur=(RANKINGS.players||[]).find(p=>p.team_id===teamId);
  if(cur){
    const curp={points:cur.points,rank:cur.rank,exact:cur.exact};
    const last=steps.length?steps[steps.length-1].p:null;
    if(!last || readingSig(last)!==readingSig(curp)){
      labels.push('now'); pts.push(cur.points); ranks.push(cur.rank); exact.push(cur.exact); live=true;
    }
  }
  return {labels,pts,ranks,exact,steps:steps.length,live};
}
function trendTag(arr){
  const v=arr.filter(x=>x!=null);
  if(v.length<2) return {cls:'same',txt:'—'};
  const d=v[v.length-1]-v[0];
  if(d>0) return {cls:'up',txt:'▲ +'+d+' since start'};
  if(d<0) return {cls:'down',txt:'▼ '+d+' since start'};
  return {cls:'same',txt:'no change'};
}
function rankTrendTag(arr){
  const v=arr.filter(x=>x!=null);
  if(v.length<2) return {cls:'same',txt:'—'};
  const d=v[0]-v[v.length-1]; // positive = improved
  if(d>0) return {cls:'up',txt:'▲ up '+d};
  if(d<0) return {cls:'down',txt:'▼ down '+Math.abs(d)};
  return {cls:'same',txt:'holding'};
}

function fixtureCounts(teamId){
  const c={all:0,upcoming:0,completed:0,today:0};
  const pdata=PRED[teamId]; if(!pdata||!pdata.matchdays) return c;
  pdata.matchdays.forEach(md=>(md.fixtures||[]).forEach(fx=>{
    c.all++;
    if(isCompleted(fx)) c.completed++; else c.upcoming++; // upcoming bucket also holds live
    if(isSameLocalDay(fx.kickoff_utc)) c.today++;
  }));
  return c;
}

function buildFilters(teamId){
  const f=$('#filters');
  const c=fixtureCounts(teamId);
  const seg=(mode,label,n)=>{
    const on=FILTERS.mode===mode;
    return `<button class="seg ${on?'active':''}" role="tab" aria-selected="${on}" data-mode="${mode}">${label}<span class="cnt">${n}</span></button>`;
  };
  f.innerHTML=`
    <div class="segmented" role="tablist" aria-label="Filter matches">
      <span class="seg-thumb" aria-hidden="true"></span>
      ${seg('all','All',c.all)}
      ${seg('upcoming','Upcoming & Live',c.upcoming)}
      ${seg('completed','Completed',c.completed)}
    </div>
    <button class="tog ${FILTERS.today?'on':''}" data-k="today" aria-pressed="${FILTERS.today}">📅 Today${c.today?`<span class="cnt">${c.today}</span>`:''}</button>`;
  f.querySelectorAll('.seg').forEach(b=>b.addEventListener('click',()=>{
    if(FILTERS.mode===b.dataset.mode) return;
    FILTERS.mode=b.dataset.mode;
    f.querySelectorAll('.seg').forEach(x=>{
      const on=x.dataset.mode===FILTERS.mode;
      x.classList.toggle('active',on);
      x.setAttribute('aria-selected',on);
    });
    positionSegThumb();
    renderSheetCurrent();
  }));
  const tg=f.querySelector('.tog');
  if(tg) tg.addEventListener('click',()=>{
    FILTERS.today=!FILTERS.today;
    tg.classList.toggle('on');
    tg.setAttribute('aria-pressed',FILTERS.today);
    renderSheetCurrent();
  });
}

/* Slide + size the segmented-control thumb under the active option. Run after
   the modal is visible (offsetWidth is 0 while the overlay is display:none). */
function positionThumb(seg){
  if(!seg) return;
  const thumb=seg.querySelector('.seg-thumb');
  const active=seg.querySelector('.seg.active');
  if(!thumb||!active) return;
  thumb.style.width=active.offsetWidth+'px';
  thumb.style.transform=`translateX(${active.offsetLeft}px)`;
}
function positionSegThumb(){ positionThumb(document.querySelector('#filters .segmented')); }
window.addEventListener('resize',()=>{
  positionSegThumb();
  positionThumb(document.querySelector('#mpSort'));
  positionThumb(document.querySelector('#schedSeg'));
});
let CURRENT_TEAM=null;
function renderSheetCurrent(){ if(CURRENT_TEAM) renderSheet(CURRENT_TEAM); }

function isCompleted(fx){ return (fx.status||'').toUpperCase()==='FT'; }

function renderSheet(teamId){
  CURRENT_TEAM=teamId;
  const pdata=PRED[teamId];
  const host=$('#sheet');
  if(!pdata||!pdata.matchdays||!pdata.matchdays.length){
    host.innerHTML=`<div class="empty">No prediction data scraped for this player yet.</div>`; return;
  }
  let html=''; let shown=0;
  pdata.matchdays.forEach(md=>{
    const fixtures=md.fixtures.filter(fx=>{
      if(FILTERS.today && !isSameLocalDay(fx.kickoff_utc)) return false;
      const done=isCompleted(fx);
      if(FILTERS.mode==='completed') return done;
      if(FILTERS.mode==='upcoming') return !done;   // upcoming & live (a live game is never FT)
      return true;                                   // 'all'
    });
    if(!fixtures.length) return;
    shown+=fixtures.length;
    html+=`<div class="group"><div class="grouphd"><span class="gr">${esc(md.round||'Round')}</span>`+
      (md.subtotal!=null?`<span class="gsub">Subtotal <b class="num">${md.subtotal}</b></span>`:'')+`</div>`;
    fixtures.forEach(fx=>html+=fixtureHtml(fx));
    html+=`</div>`;
  });
  host.innerHTML = shown? html : `<div class="empty">No matches match these filters.</div>`;
}

function teamLine(t){
  if(!t) return `<div class="teamline"><span class="hide">TBD</span></div>`;
  if(t.hidden) return `<div class="teamline">👁️ <span class="hide">hidden until deadline</span></div>`;
  if(!t.code) return `<div class="teamline"><span class="slot num">${esc(t.name||'TBD')}</span></div>`;
  return `<div class="teamline">${flagImg(t.code,'flag sm')}<span class="tn">${esc(t.name||t.code||'TBD')}</span></div>`;
}

// One predicted-team row: flag in a fixed left column, name beside it (so the
// two rows of a knockout pick share a clean flag column and never look ragged).
function predTeamLine(t){
  const name=esc((t&&(t.name||t.code))||'?');
  return `<span class="pt" title="${name}">${flagImg(t&&t.code,'flag sm')}<span class="ptn">${name}</span></span>`;
}

function fixtureHtml(fx){
  const live=isLive(fx);
  const done=isCompleted(fx);
  const when=fmtFixture(fx.kickoff_utc);
  const st=live
    ? '<span class="st live"><span class="livedot"></span>LIVE</span>'
    : (done?'<span class="st ft">FT</span>':'<span class="st ns">'+esc(fx.status||'NS')+'</span>');

  // Predicted column
  let predHtml='';
  if(fx.predicted && fx.predicted.type==='teams'){
    if(fx.predicted.hidden){
      // Pick is locked/blocked for now (deadline not passed, or not yet
      // scrapeable). Show "?" placeholders aligned to the same flag column as a
      // revealed pick — they fill in automatically once the prediction becomes
      // available, no code change needed. (The Status column already reads
      // "pending", so no extra label here.)
      predHtml=`<div class="predteams" title="Pick stays hidden until the deadline — it fills in automatically once it's revealed">
        <span class="pt pend"><span class="qmark">?</span></span>
        <span class="pt pend"><span class="qmark">?</span></span>
      </div>`;
    }else{
      predHtml=`<div class="predteams">${predTeamLine(fx.predicted.home)}${predTeamLine(fx.predicted.away)}</div>`;
    }
  }else{
    predHtml=`<div class="scoreline pred">${esc(fx.predicted?.score||'—')}</div>`;
  }

  // Actual score, shown beneath the prediction. Live games get the red "live"
  // treatment with the running score; finished games get a "Final" line that's
  // green on an exact call and red on a miss.
  let finalHtml='';
  const act=clean(fx.actual_score||'');
  const hasResult=act && act.toUpperCase()!=='NS' && /\d/.test(act);
  if(live){
    finalHtml=`<div class="actualrow"><div class="lab live"><span class="livedot"></span>Live</div>`+
      `<div class="scoreline fin live">${esc(hasResult?act:'0 - 0')}</div></div>`;
  }else if(hasResult){
    const hit=fx.is_exact?'hit':((fx.points??0)>0?'':'miss');
    finalHtml=`<div class="actualrow"><div class="lab">Final</div>`+
      `<div class="scoreline fin ${hit}">${esc(act)}</div></div>`;
  }

  // Points column
  let ptsHtml;
  if(live){
    ptsHtml=`<div class="pv num">${fx.points??0}</div><div class="pp live">live pts</div>`;
  }else if(done){
    ptsHtml=`<div class="pv num">${fx.points??0}</div>`+(fx.is_exact?`<div class="perfect">🎯 Perfect</div>`:'');
  }else{
    ptsHtml=`<div class="pp">pending</div>`;
  }

  // "Read as if it is live" caption under the prediction while a match is in play.
  let liveCap='';
  if(live){
    const home=esc(teamName(fx.match?.home)), away=esc(teamName(fx.match?.away));
    // Before the feed posts a numeric score the raw value is a status code ("NS")
    // — show "vs" rather than leaking the badge text into the matchup line.
    const lvScore=hasResult?esc(act):'vs';
    liveCap=`<div class="livecap">
      <span class="livedot"></span>LIVE NOW
      <span class="lvscore">${home} ${lvScore} ${away}</span>
      <span class="lvpts">— you're on ${fx.points??0} pts so far${fx.is_exact?' · on for a 🎯':''}</span>
    </div>`;
  }

  return `<div class="fx fxlink ${live?'live':''} ${fx.is_exact&&done?'exact':''}" data-match-key="${esc(matchKey(fx))}" role="button" tabindex="0" title="See every player's prediction for this match">
    <div class="when">${st}<div>${esc(when.date)}</div><div>${esc(when.time)}</div></div>
    <div class="match">
      ${teamLine(fx.match?.home)}
      ${teamLine(fx.match?.away)}
    </div>
    <div class="pcol"><div class="lab">Predicted</div>${predHtml}${finalHtml}</div>
    <div class="ptsbox"><div class="lab">${live?'Live':(done?'Points':'Status')}</div>${ptsHtml}</div>
    ${liveCap}
  </div>`;
}

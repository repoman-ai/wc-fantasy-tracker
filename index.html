/* ---------------- Match predictions popup ----------------
   Everyone's pick for one fixture in a single view: their picked score (or, in
   the knockout rounds, the two teams they expect), plus — once the game is
   live/done — the points it earned them, mirroring the per-player sheet. Reached
   by tapping a match anywhere it appears (live strip, recent results, the All
   Results list, or any row in a player's sheet). */

let MATCH_SORT=null;  // null = auto (points when there's a result, else rank)

/* Pull every player's entry for one fixture, plus the shared match meta. */
function collectMatch(key){
  let meta=null; const picks=[];
  Object.values(PRED).forEach(p=>{
    (p.matchdays||[]).forEach(md=>(md.fixtures||[]).forEach(fx=>{
      if(matchKey(fx)!==key) return;
      if(!meta){
        meta={
          home:teamName(fx.match?.home), homeCode:fx.match?.home?.code,
          away:teamName(fx.match?.away), awayCode:fx.match?.away?.code,
          round:md.round||fx.round||'Match', kickoff:fx.kickoff_utc,
          tz:fx.kickoff_timezone||'', venue:fx.venue||'',
          status:fx.status, actual:clean(fx.actual_score||''),
          live:isLive(fx), done:isCompleted(fx),
        };
      }
      const base=(RANKINGS.players||[]).find(x=>x.team_id===p.team_id)||{};
      picks.push({
        team_id:p.team_id, name:p.name||base.name||'Player',
        flag:p.flag||base.flag, rank:base.rank??p.rank??999,
        points:fx.points??0, is_exact:!!fx.is_exact, predicted:fx.predicted||null,
      });
    }));
  });
  return {meta,picks};
}

/* Normalise a prediction into a comparable label for the distribution and a
   render-ready shape. Hidden picks have no label (excluded from consensus). */
function predLabel(pred){
  if(!pred||pred.hidden) return {hidden:true};
  if(pred.type==='teams'){
    const h=(pred.home&&(pred.home.code||pred.home.name))||'?';
    const a=(pred.away&&(pred.away.code||pred.away.name))||'?';
    return {hidden:false,type:'teams',home:pred.home,away:pred.away,key:h+' / '+a};
  }
  const s=clean(pred.score||'');
  return {hidden:false,type:'score',score:s||'—',key:s||'—'};
}

function sortPicks(picks,mode){
  const a=picks.slice();
  if(mode==='rank') a.sort((x,y)=>x.rank-y.rank);
  else if(mode==='name') a.sort((x,y)=>x.name.localeCompare(y.name));
  else a.sort((x,y)=>(y.points-x.points)||(y.is_exact-x.is_exact)||(x.rank-y.rank)); // points
  return a;
}

function openMatch(key){ MATCH_SORT=null; openModalView({type:'match',key,render:()=>renderMatchView(key),refresh:()=>renderMatchView(key),scroll:0}); }

function renderMatchView(key){
  const {meta,picks}=collectMatch(key);
  const modal=$('#modal');
  const hasback=MODAL_STACK.length>1;
  if(!meta){
    modal.innerHTML=`<div class="mhead${hasback?' hasback':''}"><div><h3>Match</h3></div>${modalControls()}</div>`+
      `<div class="mbody"><div class="empty">No prediction data for this match yet.</div></div>`;
    wireModalControls(modal); return;
  }
  const sc=parseScore(meta.actual);
  const hasResult=!!sc && /\d/.test(meta.actual);
  const hw=hasResult&&sc.h>sc.a, aw=hasResult&&sc.a>sc.h;

  // Scoreboard hero
  let mid;
  if(meta.live) mid=`<div class="mp-score live">${hasResult?esc(sc.h+' - '+sc.a):'0 - 0'}</div><span class="st live"><span class="livedot"></span>LIVE</span>`;
  else if(meta.done&&hasResult) mid=`<div class="mp-score">${esc(sc.h+' - '+sc.a)}</div><span class="st ft">FT</span>`;
  else{ const w=fmtFixture(meta.kickoff); mid=`<div class="mp-vs">vs</div><div class="mp-kick">${esc(w.date)}${w.time?' · '+esc(w.time):''}</div>`; }
  const board=`<div class="mp-board">
    <div class="mp-side ${hw?'win':''}">${flagImg(meta.homeCode)}<div class="nm">${esc(meta.home)}</div></div>
    <div class="mp-mid">${mid}</div>
    <div class="mp-side ${aw?'win':''}">${flagImg(meta.awayCode)}<div class="nm">${esc(meta.away)}</div></div>
  </div>`;

  // Kickoff time + location strip. Location is the real host venue ("City"
  // headline, stadium as detail); only if a fixture lacks venue data do we fall
  // back to the timezone-derived city.
  const items=[];
  const when=fmtFixture(meta.kickoff);
  if(meta.kickoff) items.push(`<span class="mi"><span class="ic">🕒</span>${esc(when.date)}${when.time?`<span class="sub">·</span>${esc(when.time)}`:''}</span>`);
  const vp=venueParts(meta.venue);
  if(vp){
    items.push(`<span class="mi"><span class="ic">📍</span>${esc(vp.city)}${vp.stadium?`<span class="sub">${esc(vp.stadium)}</span>`:''}</span>`);
  }else{
    const loc=tzCity(meta.tz);
    if(loc) items.push(`<span class="mi"><span class="ic">📍</span>${esc(loc)}<span class="sub">${esc(tzAbbr(meta.kickoff,meta.tz))}</span></span>`);
  }
  const infoHtml=items.length?`<div class="mp-meta">${items.join('')}</div>`:'';

  // Consensus
  const revealed=picks.filter(p=>!predLabel(p.predicted).hidden);
  const hiddenCount=picks.length-revealed.length;
  const dist={};
  revealed.forEach(p=>{ const k=predLabel(p.predicted).key; (dist[k]=dist[k]||{key:k,count:0}).count++; });
  const distArr=Object.values(dist).sort((a,b)=>b.count-a.count);
  const nailed=picks.filter(p=>p.is_exact&&meta.done);
  const scored=picks.filter(p=>p.points>0);
  const topScore=Math.max(0,...picks.map(p=>Number(p.points)||0));
  const topScorers=topScore>0?picks.filter(p=>(Number(p.points)||0)===topScore):[];
  const soleTop=topScorers.length===1?topScorers[0]:null;
  const actualKey=hasResult?(sc.h+' - '+sc.a):null;

  const chips=[];
  if(meta.done){
    chips.push(`<div class="mp-chip ${nailed.length?'hit':''}"><span class="ic">🎯</span><b>${nailed.length}</b> of ${picks.length} nailed it</div>`);
    chips.push(`<div class="mp-chip"><span class="ic">✅</span><b>${scored.length}</b> earned points</div>`);
    if(soleTop) chips.push(`<div class="mp-chip"><span class="ic">🏆</span>Top: ${esc(soleTop.name)} <b>${soleTop.points}</b></div>`);
  }else if(meta.live){
    chips.push(`<div class="mp-chip"><span class="ic"><span class="livedot"></span></span><b>${scored.length}</b> in the points</div>`);
    if(soleTop) chips.push(`<div class="mp-chip"><span class="ic">🏆</span>Leading: ${esc(soleTop.name)} <b>${soleTop.points}</b></div>`);
  }else{
    chips.push(`<div class="mp-chip"><span class="ic">📝</span><b>${revealed.length}</b> picks in${hiddenCount?` · ${hiddenCount} hidden`:''}</div>`);
  }
  if(distArr.length) chips.push(`<div class="mp-chip"><span class="ic">👥</span>Crowd pick <b>${esc(distArr[0].key)}</b> ×${distArr[0].count}</div>`);
  const sumHtml=`<div class="mp-sum">${chips.join('')}</div>`;

  // Distribution bars (top 5)
  let distHtml='';
  if(revealed.length){
    const maxC=distArr[0].count;
    const rows=distArr.slice(0,5).map(d=>{
      const isAct=actualKey&&d.key===actualKey;
      return `<div class="mp-bar ${isAct?'is-actual':''}">
        <div class="lab"><span class="score">${esc(d.key)}</span><span class="tick">${isAct?'✓':''}</span></div>
        <div class="track"><div class="fill" style="width:${Math.round(d.count/maxC*100)}%"></div></div>
        <div class="cnt">${d.count}</div></div>`;
    }).join('');
    distHtml=`<div class="mp-dist"><h4>Pick distribution${distArr.length>5?` · top 5 of ${distArr.length}`:''}</h4>${rows}</div>`;
  }

  // Sort + list
  const mode=MATCH_SORT||((meta.done||meta.live)?'points':'rank');
  const showPts=meta.done||meta.live;
  const seg=(m,l)=>`<button class="seg ${mode===m?'active':''}" type="button" data-sort="${m}" role="tab" aria-selected="${mode===m}">${l}</button>`;
  const tools=`<div class="mp-tools"><h4>Everyone's pick</h4>
    <div class="segmented" id="mpSort" role="tablist" aria-label="Sort players">
      <span class="seg-thumb" aria-hidden="true"></span>
      ${showPts?seg('points','Points'):''}${seg('rank','Rank')}${seg('name','A–Z')}
    </div></div>`;

  const rows=sortPicks(picks,mode).map(p=>{
    const pl=predLabel(p.predicted);
    let pick;
    if(pl.hidden) pick=`<span class="hid">👁️ hidden</span>`;
    else if(pl.type==='teams') pick=`<div class="teams"><span class="t">${flagImg(pl.home&&pl.home.code,'flag sm')}${esc((pl.home&&(pl.home.name||pl.home.code))||'?')}</span><span class="t">${flagImg(pl.away&&pl.away.code,'flag sm')}${esc((pl.away&&(pl.away.name||pl.away.code))||'?')}</span></div>`;
    else pick=`<span class="sc">${esc(pl.score)}</span>`;
    let res;
    if(meta.live) res=`<div class="pv live">${p.points}</div><div class="tag">live</div>`;
    else if(meta.done) res=`<div class="pv ${p.points?'':'zero'}">${p.points}</div>`+(p.is_exact?`<div class="tag hit">🎯 exact</div>`:'');
    else res=`<div class="tag">pending</div>`;
    const cls=['mp-row'];
    if(meta.done&&p.is_exact) cls.push('exact');
    else if(showPts&&p.points>0) cls.push('scored');
    if(meta.live&&p.points>0) cls.push('live');
    return `<div class="${cls.join(' ')}">
      <div class="mp-rank">${p.rank!=null&&p.rank<999?'#'+p.rank:''}</div>
      <div class="mp-who" data-player-id="${esc(p.team_id)}" role="button" tabindex="0" title="Open ${esc(p.name)}'s prediction page">${flagImg(p.flag,'flag sm')}<span class="nm">${esc(p.name)}</span></div>
      <div class="mp-pick">${pick}</div>
      <div class="mp-res">${res}</div>
    </div>`;
  }).join('');

  modal.innerHTML=`
    <div class="mhead${hasback?' hasback':''}">
      <div><h3>${esc(meta.round)}</h3><div class="meta">${esc(meta.home)} vs ${esc(meta.away)} · ${picks.length} players</div></div>
      ${modalControls()}
    </div>
    <div class="mbody">
      ${board}${infoHtml}${sumHtml}${distHtml}${tools}
      ${rows||'<div class="empty">No picks for this match.</div>'}
    </div>`;
  wireModalControls(modal);
  const sortBox=modal.querySelector('#mpSort');
  if(sortBox){
    sortBox.querySelectorAll('.seg').forEach(b=>b.addEventListener('click',()=>{
      if(b.dataset.sort===mode) return;   // already showing this order
      MATCH_SORT=b.dataset.sort; renderMatchView(key);
    }));
    requestAnimationFrame(()=>positionThumb(sortBox));
  }
}

/* ---------------- Charts ---------------- */
let CHART_LEN=0;
function destroyCharts(){ charts.forEach(c=>c.destroy()); charts=[]; }
function baseOpts(extra={}){
  return Object.assign({
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
    elements:{point:{radius:CHART_LEN>20?0:3,hoverRadius:5}},
    scales:{x:{grid:{display:false},ticks:{maxRotation:0,autoSkip:true,maxTicksLimit:5,font:{size:10}}}}
  },extra);
}
function drawCharts(s){
  destroyCharts();
  CHART_LEN=s.labels.length;
  const acc='#4f46e5', grn='#16a34a', amb='#f4b400';
  const mk=(id,data,color,opts)=>{
    const el=document.getElementById(id); if(!el) return;
    charts.push(new Chart(el,{type:'line',data:{labels:s.labels,datasets:[{
      data,borderColor:color,backgroundColor:color+'22',fill:true,tension:.3,borderWidth:2,spanGaps:true,
      stepped:opts&&opts.stepped||false}]},options:baseOpts(opts&&opts.scales?{scales:opts.scales}:{})}));
  };
  mk('cPts',s.pts,acc,{scales:{x:{grid:{display:false},ticks:{maxTicksLimit:5,font:{size:10}}},y:{beginAtZero:false,ticks:{font:{size:10}}}}});
  mk('cRank',s.ranks,grn,{stepped:true,scales:{x:{grid:{display:false},ticks:{maxTicksLimit:5,font:{size:10}}},y:{reverse:true,ticks:{precision:0,stepSize:1,font:{size:10}}}}});
  mk('cExact',s.exact,amb,{scales:{x:{grid:{display:false},ticks:{maxTicksLimit:5,font:{size:10}}},y:{beginAtZero:true,ticks:{precision:0,font:{size:10}}}}});
}

function closeModal(){
  MODAL_STACK=[]; $('#overlay').classList.remove('open'); document.body.style.overflow='';
  resetDrag();   // clear any in-progress swipe transform so the next open is clean
  destroyCharts();
}
// Overlay-click and Esc pop one level (Back), closing outright at the root.
$('#overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') popModal(); });

/* ---------------- Swipe-down-to-close (collapse-to-color dismiss) ----------
   Drag the popup down (from the header, or from the body when it's scrolled to
   the top) to dismiss it. As you drag, the header's purple sweeps downward as a
   curtain inside the popup (the --bleed-* custom props feed .modal::before),
   while the sheet itself elastically slides + scales + rounds its corners. The
   colour expansion stays contained within the popup; the backdrop only dims.
   Releasing past the threshold completes the fill and closes; otherwise it
   springs back. */
(function(){
  const modal=$('#modal'), hint=$('#swipeHint');
  const CLOSE_AT=110;            // px past which release dismisses
  const BLEED_FULL=220;          // px of drag that maps to the header fully filling the popup
  const SPRING='transform .28s cubic-bezier(.22,.61,.36,1), border-radius .28s ease';
  let startY=0, dy=0, active=false, dismissing=false, timer=0;
  function resist(d){ return d>0?d:0; }   // only downward drag counts
  // p (0..1) drives both the sheet's motion and the in-popup colour curtain.
  function bleed(p){ modal.style.setProperty('--bleed-p',p); modal.style.setProperty('--bleed-o',Math.min(1,p*1.6)); }
  function paint(dist){
    const p=Math.min(1, dist/BLEED_FULL);
    modal.style.transform=`translateY(${dist}px) scale(${1-0.04*p})`;
    modal.style.borderRadius=`${22+10*p}px`;
    bleed(p);
    if(hint) hint.style.opacity=String(Math.min(1,dist/45));
  }
  window.resetDrag=function(){
    active=false; dismissing=false; dy=0; if(timer){ clearTimeout(timer); timer=0; }
    modal.classList.remove('dragging');
    modal.style.animation=''; modal.style.transition=''; modal.style.transform=''; modal.style.borderRadius='';
    modal.style.removeProperty('--bleed-p'); modal.style.removeProperty('--bleed-o');
    if(hint) hint.style.opacity='0';
  };
  modal.addEventListener('touchstart',e=>{
    if(e.touches.length!==1 || dismissing) return;
    const body=modalScroller();
    const onHead=e.target.closest && e.target.closest('.mhead');
    const atTop=!body || body.scrollTop<=0;
    if(!onHead && !atTop) return;          // mid-scroll: let the body scroll
    startY=e.touches[0].clientY; dy=0; active=true;
    // Drop the open ("pop") animation — its fill:both final keyframe would
    // otherwise override the inline transform we drive during the drag. The
    // .dragging class kills the curtain's transition so it tracks the finger.
    modal.style.animation='none';
    modal.style.transition='none';
    modal.classList.add('dragging');
  },{passive:true});
  modal.addEventListener('touchmove',e=>{
    if(!active) return;
    dy=resist(e.touches[0].clientY-startY);
    if(dy<=0){ modal.style.transform=''; modal.style.borderRadius=''; bleed(0);
      if(hint) hint.style.opacity='0'; return; }
    if(e.cancelable) e.preventDefault();   // suppress rubber-band while dragging
    paint(dy);
  },{passive:false});
  function end(){
    if(!active) return;
    active=false;
    const go=dy>CLOSE_AT;
    modal.classList.remove('dragging');     // re-enable the curtain transition
    modal.style.transition=SPRING;
    if(hint) hint.style.opacity='0';
    if(go){
      // Complete the fill: the purple curtain covers the whole popup, then the
      // now-solid-purple sheet slides away.
      dismissing=true;
      bleed(1);
      const drop=(window.innerHeight||800)*0.9;
      modal.style.transform=`translateY(${drop}px) scale(.92)`;
      timer=setTimeout(closeModal,260);
    } else {
      // Spring back to rest.
      modal.style.transform=''; modal.style.borderRadius=''; bleed(0);
      dy=0;
    }
  }
  modal.addEventListener('touchend',end);
  modal.addEventListener('touchcancel',end);
})();
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&MODAL_STACK.length) popModal(); });

// One delegated handler opens the match popup from any [data-match-key] element
// (live strip, recent results, the All Results list, a player's sheet row).
document.addEventListener('click',e=>{
  const player=e.target.closest&&e.target.closest('[data-player-id]');
  if(player){
    openPlayer(player.getAttribute('data-player-id'));
    return;
  }
  const el=e.target.closest&&e.target.closest('[data-match-key]');
  if(el) openMatch(el.getAttribute('data-match-key'));
});
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter'&&e.key!==' ') return;
  const player=e.target.closest&&e.target.closest('[data-player-id]');
  if(player){
    e.preventDefault();
    openPlayer(player.getAttribute('data-player-id'));
    return;
  }
  const el=e.target.closest&&e.target.closest('[data-match-key]');
  if(!el) return;
  e.preventDefault();
  openMatch(el.getAttribute('data-match-key'));
});

init();
</script>
